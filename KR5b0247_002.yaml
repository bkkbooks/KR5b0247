front:
  text: 太上慈悲九幽拔罪懴卷之二木二爾時元始天尊為普救真人演説東方青靈始老蒼帝九氣天君華林境界無極之國惠靜莊嚴既竟重為演説東南方梵氣天君碧霞境界其有真人名曰真安無極之國妙寂莊嚴若人臨終之曰願生彼國當潔已清齋請師奉禮東南方應號天尊長跪懴悔免恆沙罪障獲無量善因鍊質澄神登真悟道衆等至心今當敬禮
  hash: sha256:84a6d408222cb79c55a71b79779615652bf2f2f83cf224926529563e47669c96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_002-001a, image: hfl/0300/0300-024.png}
body:
  text: 人各恭敬志心朝禮東南方好生度命天尊志心朝禮慈風廣扇天尊志心朝禮法身出世天尊志心朝禮無礙自在天尊志心朝禮巧説法相天尊志心朝禮增益惠解天尊志心朝禮善權方便天尊志心朝禮至寂澄明天尊志心朝禮智惠無等天尊志心朝禮太微應號天尊志心朝禮通玄定相天尊志心朝禮洞鑒幽明天尊志心朝禮梵明弘教天尊志心朝禮安樂勝報天尊志心朝禮升玄至極天尊志心朝禮妙光寶勝天尊志心朝禮中和大惠天尊志心朝禮一乘虛極天尊志心朝禮玄宗誕應天尊志心朝禮無量威化天尊志心朝禮宣輝妙覺天尊志心朝禮冥神洞宴天尊志心朝禮金映護魂天尊志心朝禮西靈惠照天尊志心朝禮四極顯真天尊志心朝禮玄真九老天尊志心朝禮上聖十華天尊志心朝禮四虛普照天尊志心朝禮真元七照天尊志心朝禮二素皓靈天尊志心朝禮金門演教天尊志心朝禮太華上極天尊志心朝禮空洞虛皇天尊志心朝禮玄光度世天尊志心朝禮九空太素天尊志心朝禮靈耀八景天尊志心朝禮七覺照疑天尊志心朝禮三素光明天尊志心朝禮大洞景華天尊志心朝禮無上真如天尊志心朝禮元和寶勝天尊志心朝禮定光命祿天尊志心朝禮皓華素德天尊志心朝禮妙寶淨光天尊志心朝禮真明虛極天尊志心朝禮沖和靈應天尊志心朝禮太和髙上天尊志心朝禮虛極妙靈天尊志心朝禮寶華元梵天尊志心朝禮淨藏祕景天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔至心歸命十方常住三寶臣等懴悔身業之罪自從生誕形體分張首負圓天足履方地肌尸穢醜骨血腥凡不蔽星辰恆干風兩纍此陽過必犯隂愆憑此善緣咸希懴洗天尊言曰若有善男子善女人為其亡人初終百日周年逺忌造諸經像齋供財貨雖多獲功彌少但緣心恆慢易意且粗踈殘食獻齋餘財設像一捨一慳或作或休名價雖髙計功全寡或觸之以葷雜或捨之以狐疑致使獲功三分惟一譬如衣服裁截雖了竟久不縫必欲人著在身未審從何慣帶蓋緣有初無末是以功績不成若人造諸經像設諸齋食及施與法師物等一分失落隱沒差殊其福不成何勞須造徒費財貨枉用𥘉功見在招殃亡人獲罪即使重淪地獄再受冥愆苦楚切身飢寒備體逡巡不過竟久難存鐵杖穿心火丸燋口重重須受一一皆償走避無門竄身何地殃延七祖禍及九玄莫議逍遙空思善果縱生追悔難免前非都緣積善善鍾積惡惡至如形逐影似響隨聲曲直難逃清濁難顯汝等男女精虔捨施齋潔懴揚莫假聲名便言功德聲名功德其罪如斯善女信男悉皆諦受即使魂靈解脫災厄蠲除稽首歸依今當敬禮人各恭敬志心朝禮宗師度脫天尊志心朝禮法力超升天尊志心朝禮玄素惣德天尊志心朝禮太華應運天尊志心朝禮髙皇玉帝天尊志心朝禮勝光寶耀天尊志心朝禮髙勝玄景天尊志心朝禮中皇真際天尊志心朝禮元洞玉晨天尊志心朝禮髙上太一天尊志心朝禮至極明空天尊志心朝禮玉虛挺相天尊志心朝禮惣真元洞天尊志心朝禮流光應現天尊志心朝禮流鑒照幽天尊志心朝禮通逺深淵天尊志心朝禮金容顯相天尊志心朝禮垂形散影天尊志心朝禮流光四朗天尊志心朝禮洞元積感天尊志心朝禮髙玄惣真天尊志心朝禮皓明梵寶天尊志心朝禮金光七素天尊志心朝禮玉皇真極天尊志心朝禮玄上太微天尊志心朝禮洞惠虛容天尊志心朝禮明機流鑒天尊志心朝禮尋真大洞天尊志心朝禮凝神會聖天尊志心朝禮玄真太一天尊志心朝禮淨滿寶光天尊志心朝禮大乘景德天尊志心朝禮耀明髙上天尊志心朝禮普垂玄照天尊志心朝禮玉潤流耀天尊志心朝禮上華元一天尊志心朝禮七變元和天尊志心朝禮五劫開化天尊志心朝禮含光祕景天尊志心朝禮清都證極天尊志心朝禮靈化洞虛天尊志心朝禮沖虛入妙天尊志心朝禮延壽保命天尊志心朝禮北極明耀天尊志心朝禮玄虛太極天尊志心朝禮紫庭虛皇天尊志心朝禮金容應福天尊志心朝禮瓊華十善天尊志心朝禮玄微隱耀天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶已復次懴悔至心歸命十方常住三寶臣等懴悔身業之罪但緣分身貴賤髙下不均稟氣富貧寬狹難等或貴者深堂廣宇拖紫紆朱銀壁椒房丹臺玉楯或賤者蒼頭跣足逐後迎前聲氣羇微格式卑下或富者輕裘肥馬奧室精餐言語如鍾心襟似海或貧者飢寒不逮禮義何周言行相違施為無擬紛兹身業豈解秉持違過更多誰能堅守前雖懴悔尚恐未周當此虔誠咸希滌蕩天尊言曰善哉如卿所言護持世界能為衆生方便問難咨請諸疑隨意科數一一具問咸實希有我令重嘆不可思議告諸衆生諦聽修之當為解説若有善男子善女人等父母終亡之後資備生方捨家資財禮經乞懴蕩滌諸愆獲生天界若有男女寫經造像設供持齋財物有餘私將入己其物直一錢已上十年十倍又復不還身當重病失其相好鳥栖露宿死棄人間永無出期縱得受生聾盲六疾恆不具足若用幡花物者七年七倍又復不還身當囚徒在於囹圄被著枷鎖縶繫晨昏劣瘦日深告雪無已若用布施法師物者五年五倍又復不還身為貧窮衣食寒賤或為牛馬以力報酬或作豬羊以命相負或幼遭孤孑無處依投倚傍他人身口不備都緣不孝致此𡨚愆汝等男女咸皆諦受勤修功德秉戒身形一心奉行稽首而退太上慈悲九幽拔罪懴卷之二
