front:
  text: 太上慈悲九幽拔罪懴卷之三木三爾時元始天尊為普救真人演説東南方梵氣天君碧霞境界無極之國妙寂莊嚴既竟重為演説南方梵寶昌陽丹靈真老赤帝三氣天君梵天境界其有真人名曰真老無極之國端化莊嚴若人臨終之日願生彼國當潔巳清齊請師奉禮南方應號天尊長跪懴悔免恆沙罪障獲無量善因錬質澄神登真悟道衆等至心今當敬禮
  hash: sha256:822e1437624e5c1dc92cc9cf89c14e472fdb4d048362d0b5aee90bd5a36047d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_003-001a, image: hfl/0300/0300-042.png}
body:
  text: 人各恭敬志心朝禮南方玄真萬福天尊志心朝禮髙真大寶天尊志心朝禮玄和大度天尊志心朝禮紫宸降福天尊志心朝禮上惠弘慈天尊志心朝禮冥寂幽源天尊志心朝禮雲光正德天尊志心朝禮還淳示像天尊志心朝禮安神寂照天尊志心朝禮紫極元君天尊志心朝禮玄真妙寶天尊志心朝禮四達無礙天尊志心朝禮六辨虛凝天尊志心朝禮明耀景秀天尊志心朝禮圓光炳耀天尊志心朝禮金映流真天尊志心朝禮玄上紫虛天尊志心朝禮太微妙極天尊志心朝禮靈光空相天尊志心朝禮無上景皇天尊志心朝禮虛明洞惠天尊志心朝禮寶玄流化天尊志心朝禮澄神寶劫天尊志心朝禮妙智湛常天尊志心朝禮五靈玄德天尊志心朝禮六度凝解天尊志心朝禮髙元上相天尊志心朝禮普光弘濟天尊志心朝禮凝玄髙上天尊志心朝禮耀景元和天尊志心朝禮弘明寶相天尊志心朝禮惠空無滯天尊志心朝禮沖和逺暢天尊志心朝禮含光萬善天尊志心朝禮遊虛常樂天尊志心朝禮端嚴上德天尊志心朝禮明霞通智天尊志心朝禮乘真道化天尊志心朝禮靈化妙見天尊志心朝禮瑩德明皇天尊志心朝禮通玄釋滯天尊志心朝禮德充無上天尊志心朝禮虛皇演聖天尊志心朝禮玄冥廣運天尊志心朝禮慈忍救度天尊志心朝禮中極元老天尊志心朝禮元靈髙聖天尊志心朝禮中皇太一天尊志心朝禮梵氣彌綸天尊志心朝禮黃庭大保天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶已復次懴悔至心歸命十方常住三寶臣等懴悔心業之罪伏自初分南北漸辨東西愛好嫌粗喜富嗔賤信心所作不度短長貪利忘恩隔親憐外見華飾則無猒無足聞簡實則如隙如讎罪積丘山功無塵露慮標名北部奪算南宫是敢懴悔道前乞垂原赦天尊言若有善男子善女人從生至死毀壞尊像損破道場或剝脫行人及出家法身或破諸禁戒啖葷血之徒五逆生心合舌為本誹謗三寶嗔怒慈親或棄賤憎貧背夫逐婦或造私潤已背正入邪同氣不親交遊益重或用三寶物無有愧心貸債彌多抵賴不少或殺生偷盜不信公途向暗背明欺存誷殁或罵詈良善淩突賢人淫欲恆多隂毒不息諸如此罪盡係冥關不有懴揚將何消蕩若有善男子善女人常行孝心旦暮不怠或為父母或為九玄或為交親或為血屬或為兄弟或為巳身捨施資財請師禮懴精羞供養嚴潔道場或八節三元五臘十直七元本命歲旦庚申是此良辰或持齋戒可除八難能去千災一切𡨚家咸恩洗雪先亡離苦久逺生天地獄停酸幽關水閉愚癡曉了六疾痊平涉歷四時不罹災舋汝等男女各自慎行兢兢在心勿生猒倦即逢善果遇此因緣懴悔既終齊心敬禮人各恭敬志心朝禮三素洞神天尊志心朝禮大哀愍苦天尊志心朝禮霞光朗耀天尊志心朝禮中玄正一天尊志心朝禮黃房洞晏天尊志心朝禮玄上虛無天尊志心朝禮玄微大寶天尊志心朝禮黃庭九老天尊志心朝禮威靈拔度天尊志心朝禮大明皓氣天尊志心朝禮玄真上景天尊志心朝禮太皇勝妙天尊志心朝禮靈元寶命天尊志心朝禮流光通道天尊志心朝禮飛華慶善天尊志心朝禮定相延和天尊志心朝禮回元至極天尊志心朝禮應飛光像天尊志心朝禮無心妙體天尊志心朝禮六度真容天尊志心朝禮興龍道相天尊志心朝禮髙真觀妙天尊志心朝禮流變延真天尊志心朝禮妙樂難勝天尊志心朝禮元皇一氣天尊志心朝禮玄虛太素天尊志心朝禮真老福慶天尊志心朝禮青真妙覺天尊志心朝禮元精始老天尊志心朝禮玄和淨德天尊志心朝禮太空惠量天尊志心朝禮明真四極天尊志心朝禮自然靈應天尊志心朝禮積慶天和天尊志心朝禮廣運慈善天尊志心朝禮萬靈導護天尊志心朝禮弘慈廣濟天尊志心朝禮明皇救善天尊志心朝禮開度福道天尊志心朝禮垂光慈蔭天尊志心朝禮妙智善權天尊志心朝禮六合通明天尊志心朝禮開度憂危天尊志心朝禮升真大帝天尊志心朝禮神章八會天尊志心朝禮太丹三素天尊志心朝禮元和寶相天尊志心朝禮太真髙上天尊志心朝禮流光萬變天尊志心朝禮通玄真定天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶已復次懴悔至心歸命十方常住三寶臣等懴悔心業之罪但以智見淺短氣格頑愚恣縱而行言執巳是貪婪無足鄙吝何窮見善而讎聞惡可及積財千萬猶説困懸為罪深多恆稱公當從初至末豈覺豈知積日積時逾年逾月不申懴洗何以祛除今對道前咸希滌蕩天尊言善男子善女人一切業緣皆有報應汝等諦受次第具陳鐵床壞體銅柱焦筋以報邪淫之罪寒氷雪山痛心傷骨以報劫盜之罪拔舌吞火灌口鎔銅以報兩舌之罪熱灰埋體猛火燒身以報殺生之罪鐵犂耕背惡鳥啖睛劒樹分張碓磨如麵以報邪眉怒眼之罪身為餓鬼偱歷鑊湯燒鐵為丸飢則當食以報破齋違戒之罪眉髮墮落遍體生瘡舉身烘爛以報破壞聖像道場之罪口中出火眼目生瘡遍體流膿藏身無地以報走脫出家人之罪舌不得語閉塞喉中盲目亡睛口唇橫裂以報謗説出家人之罪癡聾小短生死不分或作夫妻中道離别以報踈隔父母之罪或為牛馬豬羊鳥獸鷹犬以報違負貸債之罪或為僕使寒賤切身少寡幼孤羇羸劣病以報輕薄弟兄同氣之罪如斯報應皆在目前善女信男咸自思想虔心諦受永斷前愆懴悔既終奉行而退太上慈悲九幽拔罪懴卷之三
