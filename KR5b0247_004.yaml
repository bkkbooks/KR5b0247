front:
  text: 太上慈悲九幽拔罪懴卷之四木四爾時元始天尊為普救真人演說南方梵寶昌陽丹靈真老赤帝三氣天君梵天境界無極之國端化莊嚴既競重為演說西南方梵氣天君耀真境界其有真人名曰瓊光無極之國善救莊嚴若人臨終之日願生彼國當潔己清齊請師奉禮西南方應號天尊長跪懴悔免恆沙罪障獲無量善因錬質澄神登真悟道衆等至心今當敬禮
  hash: sha256:a08b3eb5153f8c1dd1221102e37c624a51650dca18e6ef001b3091cf9a2e9068
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_004-001a, image: hfl/0300/0300-060.png}
body:
  text: 人各恭敬志心朝禮西南方太靈虛皇天尊志心朝禮中和善寂天尊志心朝禮崇愛延光天尊志心朝禮大明煥照天尊志心朝禮普救群生天尊志心朝禮景德丹華天尊志心朝禮通光普照天尊志心朝禮玄機妙應天尊志心朝禮七元信惠天尊志心朝禮端相開妙天尊志心朝禮七曜延靈天尊志心朝禮混成開化天尊志心朝禮通明四洞天尊志心朝禮啓幽元極天尊志心朝禮空玄明梵天尊志心朝禮太上隱真天尊志心朝禮靈都集慶天尊志心朝禮太靈普被天尊志心朝禮浮空七耀天尊志心朝禮雲光四照天尊志心朝禮保命護魂天尊志心朝禮洞空圓極天尊志心朝禮法輪開化天尊志心朝禮丹華皓映天尊志心朝禮流明大帝天尊志心朝禮玄圃瓊輪天尊志心朝禮留神逺照天尊志心朝禮紫庭㑹聖天尊志心朝禮匠道衆真天尊志心朝禮廣運玄化天尊志心朝禮靈源普潤天尊志心朝禮崇真演教天尊志心朝禮安化太無天尊志心朝禮耀景棲真天尊志心朝禮保光洞朗天尊志心朝禮八景回晨天尊志心朝禮圓通妙化天尊志心朝禮大明至極天尊志心朝禮靈源廣洽天尊志心朝禮含光朗耀天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔至心歸命十方常住三寶臣等懴悔口業無量之罪或曾欺賢誷聖毀道憎親談讟他非矜誇巳是呵風罵雨惡暑厭寒翻有為無將粗作細鬪合良善揚舉愚癡從口而生為罪之本諸多過咎無量無邊今日向十方天尊前洗心丹禱歸命懴悔咸乞蕩除天尊言若有善男子善女人一為天地二為帝王三為父母四為衆生五為血屬六為已身爰從受生巳來至于今日自一歲一十二十三十四十五十乃至百歲百二十歲必欲預修還從一七二七三七四七乃至七七百日周年周而復始乃至永年所造功德還依次第而作第一造像第二寫經次即造四十九尺長幡設四十九人齊安置道場請諸尊像并及法師香火知識燃四十九燈照耀諸天其燈為三層臺下濶上斂圓轉狀如車輪香華供養隨力豐儉三日三夜或七日七夜傾心丹禱懴悔䖍祈對三寶稱揚為先亡首過言詞惟在朴實不得浮華務彼精嚴必彰福利其次廣贖生命或百或千隨其多寡亦不可得其次傷憫貧窮下賤不具足者旅困羇棲者病人孤老者囚徒飢餒者邊鄙愚頑不曉東西無分善惡者咸堪救度使沐良緣或值他方逺客有急依投而為開度濟其厄難救彼孤寒悉令安樂此亦薦導亡靈其福最大其次為先亡父母億劫種親寫造三十六部尊經任意多少或一部十部百部乃至千部隨力多少拔度魂神其福無量使見存利益過往逍遙汝等男女悉當諦聽宜各奉行人各恭敬志心朝禮弘真度物天尊志心朝禮惣御衆仙天尊志心朝禮法明靈鑒天尊志心朝禮太霄耀景天尊志心朝禮結朗重明天尊志心朝禮啓真玄素天尊志心朝禮混化變生天尊志心朝禮思玄會寂天尊志心朝禮靈光皓映天尊志心朝禮華光流照天尊志心朝禮法音演暢天尊志心朝禮凝虛善寂天尊志心朝禮梵元真一天尊志心朝禮為寶積德天尊志心朝禮福感靈照天尊志心朝禮慈悲惠照天尊志心朝禮無量相好天尊志心朝禮光顯開度天尊志心朝禮正覺凝耀天尊志心朝禮法輪運轉天尊志心朝禮普照洞虛天尊志心朝禮廣濟群有天尊志心朝禮內觀真極天尊志心朝禮玄宗衆寶天尊志心朝禮虛無正極天尊志心朝禮智光普耀天尊志心朝禮法定通微天尊志心朝禮寶輪常運天尊志心朝禮玄真會寂天尊志心朝禮玄妙善權天尊志心朝禮等觀真常天尊志心朝禮重光寶際天尊志心朝禮合和安忍天尊志心朝禮太玄靈耀天尊志心朝禮崇靈道惠天尊志心朝禮玄覺寶光天尊志心朝禮普慈護國天尊志心朝禮神光廣被天尊志心朝禮方便善救天尊志心朝禮無為應物天尊志心朝禮玉晨上極天尊志心朝禮惣祿主算天尊志心朝禮定惠上生天尊志心朝禮髙上玉華天尊志心朝禮晨光大帝天尊志心朝禮司命延生天尊志心朝禮惣鑒命魔天尊志心朝禮玉京真實天尊志心朝禮上聖丹臺天尊志心朝禮度明玉簡天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶已復次懴悔至心歸命十方常住三寶臣等重復懴悔口業之罪自從曠劫以來至于今日口業所重衆等難偕逞辨為先巧言為貴或戲上慢下搆僞為真輕諾肆情誹謗恣意評論聖教訾毀真文綺言飾非華詞惑衆耽於滋味茹彼腥羶如此愆非悉為口業今日向十方天導前洗心懴悔咸乞蕩除爾時太上道君上白天尊言今見細細微塵無億之數寧為多不天尊言甚多甚多道君曰今將此經像幡贖生散施功德等寧為多不天尊曰甚多甚多今將此細微塵數譬於此經像幡功德亦如塵沙數之得不甚多甚多不可稱量如此因緣最為第一其經像幡等造訖建立道場七日七夜吟詠讃嘆誦經解結散華行香鳴鍾擊磬令一切𡨚讎悉皆解脫及以眷屬逺近內外親緣皆來道場同發歡喜懴悔布施勿生計念罪可除滅七祖父母出離地獄升上天堂告諸男女修齊禮拜受戒持心忍辱柔弱供養三寶及出家人斷諸葷穢燒香燃燈贖命放生皆譬我身更無别異善男信女諦聽道前依法奉行稽首而退太上慈悲九幽拔罪懴卷之四
