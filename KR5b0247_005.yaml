front:
  text: 太上慈悲九幽拔罪懴卷之五木五爾時元始天尊為普救真人演説西南方梵氣天君耀真境界無極之國善救莊嚴既竟重為演説西方七寶金門皓靈皇老白帝七氣天君金光境界其有真人名曰法寶無極之國利益莊嚴若人臨終之日願生彼國當潔巳清齋請師奉禮西方應號天尊長跪懴悔免恆沙罪障獲無量善因錬質澄神登真悟道衆等至心歸命敬禮
  hash: sha256:08118f254a6bdd5ac975ecbad6841f210b83c19e8110ec3905021c533a0701e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_005-001a, image: hfl/0300/0300-078.png}
body:
  text: 人各恭敬志心朝禮西方太妙至極天尊志心朝禮虛皇定祿天尊志心朝禮主生護命天尊志心朝禮通玄衆聖天尊志心朝禮十聖金光天尊志心朝禮廣流恩化天尊志心朝禮弘濟無邊天尊志心朝禮大通靈應天尊志心朝禮惠解無礙天尊志心朝禮神威逺振天尊志心朝禮四明洞朗天尊志心朝禮真空辨智天尊志心朝禮玄虛帝一天尊志心朝禮威變自在天尊志心朝禮安樂無為天尊志心朝禮收魔消惱天尊志心朝禮光映真容天尊志心朝禮玄上玉華天尊志心朝禮金耀流光天尊志心朝禮神耀洞量天尊志心朝禮飛丹照極天尊志心朝禮上玄沖用天尊志心朝禮大帝玄真天尊志心朝禮元皇廣化天尊志心朝禮大羅圓極天尊志心朝禮寶光通照天尊志心朝禮瓊津流潤天尊志心朝禮太淨安和天尊志心朝禮明珠洞啓天尊志心朝禮平等弘慈天尊志心朝禮玉清玄上天尊志心朝禮金簡法藏天尊志心朝禮元和敬愛天尊志心朝禮智明空解天尊志心朝禮丹洞玉皇天尊志心朝禮七曜神真天尊志心朝禮天景玄微天尊志心朝禮金映光華天尊志心朝禮元陽量化天尊志心朝禮玄都總聖天尊志心朝禮慈恩萬善天尊志心朝禮耀靈智海天尊志心朝禮千真上妙天尊志心朝禮流珠光照天尊志心朝禮寶林元洞天尊志心朝禮髙仙等聖天尊志心朝禮凝神靜惠天尊志心朝禮玄真蒙惠天尊志心朝禮保命長生天尊志心朝禮洞靈玄照天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命十方常住三寶臣等懴悔今生造作之罪或魯操心不善措意多愚貪愛嗔癡邪淫縱蕩外真內偽口是心非嫉妬賢良烹傷物命六情三業故作誤為凡兹舋咎無量無邊因今向十方天尊前歸命懴謝咸乞蕩除天尊言若有善男子善女人在生之日造諸惡業或負人財寶結彼仇讎侵掠無猒貪求不息或用三寶財物或偷公家財物或為男女或為鄉閶或為巳身或為朋友或自作或教他罔識善因唯知念惡如是等罪無量無邊卒難可説汝等過去亡者男女魂靈及以見世因緣眷屬為其亡者命終之後建立道場或一七二七三七乃止七七日內即造幡二十一口青黃碧緑各長七尺於道場之內尊像之前廣設香華懸諸旙蓋供養天尊及其經法但當精心營辦隨力施為寫造真經綵繪尊像及以布施出家法身或三日三夜或七日七夜轉經行道讃詠洞章旋繞法座率領親屬同詣道場各勵本心為其往逝救拔苦厄升入天堂謝過贖愆同心懴悔無有滯礙克遂逍遙若復衆中有人心生懈怠縱營功德不勵精誠如斯亡靈罪咎難免更增苦報無有出期汝等男女各自諦聽虔心剋已莫有稽疑如上因緣不可稱説乘此善果徑上南宫削落罪名去離幽閉轉輪福慶隨願往生衆等回心歸命懴悔人各恭敬志心朝禮長生司命天尊志心朝禮紫極流霞天尊志心朝禮飛步太虛天尊志心朝禮靈應無極天尊志心朝禮流金紫極天尊志心朝禮海量保真天尊志心朝禮丹華勝上天尊志心朝禮玄臺虛應天尊志心朝禮深證空解天尊志心朝禮玄珠耀彩天尊志心朝禮法王皓素天尊志心朝禮太極金華天尊志心朝禮日耀流光天尊志心朝禮碧落真客天尊志心朝禮金華慈惠天尊志心朝禮元靈寶相天尊志心朝禮明霞洞焕天尊志心朝禮延算益壽天尊志心朝禮慈雲普應天尊志心朝禮圓極大哀天尊志心朝禮紫蓋回玄天尊志心朝禮絳陵化度天尊志心朝禮真氣湛常天尊志心朝禮靈通福慶天尊志心朝禮梵天皓景天尊志心朝禮隨方救苦天尊志心朝禮方開化度天尊志心朝禮髙上玉虛天尊志心朝禮金真妙寶天尊志心朝禮景皇淳素天尊志心朝禮皓華真極天尊志心朝禮妙極崇善天尊志心朝禮真寂證空天尊志心朝禮崇仙護命天尊志心朝禮髙真妙果天尊志心朝禮崇開大惠天尊志心朝禮醫王廣施天尊志心朝禮上極元化天尊志心朝禮威光逺感天尊志心朝禮玄宗度世天尊志心朝禮興隆法寶天尊志心朝禮妙成惠解天尊志心朝禮顯定真關天尊志心朝禮龍威梵度天尊志心朝禮混元至極天尊志心朝禮明耀太華天尊志心朝禮真源上妙天尊志心朝禮玄明梵行天尊志心朝禮玉真隱韻天尊志心朝禮度生大明天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶已復次懴悔志心歸命十方常住三寶臣等懴悔今生過誤之罪或曽明明造惡都不自知固固為非言猶自是蓋緣性識稟受低凡心溺愛河身沉欲海一朝長逝永墮幽關無有出期備經苦惱非憑道力何拔孤魂天尊言汝等諦聽凡有新亡從𥘉終之日便捨資財禮此經懴一七二七三七之內造諸功德者最為上法但緣亡人才離人世乍入泉扃須藉良因以憑薦拔三七之中造諸功德是名為次法第一造像第二造經第三造齋戒第四造幡華第五燃香燈第六修道場第七贖生命第八持布施第九廣救濟第十除心慳第十一慈悲捨第十二平等心爾時天尊説十二福及諸功德因緣若有善男子善女人能依此追修營諸功德其人孝道必達天曹決定亡人永離地獄逍遙快樂長處福堂衣食自然登真悟道所以爾者薦導功德最為第一昔有一人魯將一文捨入常住獲福無量又童子獻土變成硃砂報應因緣如影逐形譬如淨鏡照人媸妍自别善惡之業理亦如然所以孝思其功最大汝等男女各審思惟欲答劬勞無先聖力告諸賢者宜各奉行太上慈悲九幽拔罪懴卷之五
