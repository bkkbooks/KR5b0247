front:
  text: 太上慈悲九幽拔罪懴卷之六木六爾時元始天尊爲普救眞人演說西方七寳金門皓靈皇老七氣天君金光境界无極之國利益莊嚴旣竟重爲演說西北方梵炁天君妙道境界其有眞人名曰濟苦无極之國眞仙莊嚴若人臨終之日願生彼國當潔巳清齋請師奉禮西北方應號天尊長跪懴悔滅恒沙罪障獲無量善因錬質澄神登眞悟道衆等志心歸命敬禮
  hash: sha256:078644f6ee8719618abc998d40da4eb2ca386068cf9e2dee83a63fef0338ba00
