body:
  text: 人各恭敬志心朝禮西北方無量太華天尊志心朝禮常弘法果天尊志心朝禮寶雲妙樂天尊志心朝禮惠朗靜明天尊志心朝禮真源妙解天尊志心朝禮分形起應天尊志心朝禮洞明世界天尊志心朝禮應現真身天尊志心朝禮無邊智惠天尊志心朝禮隨物應形天尊志心朝禮應現色身天尊志心朝禮上品妙成天尊志心朝禮降邪滅惡天尊志心朝禮無方化度天尊志心朝禮常龍德變天尊志心朝禮廣常慈愛天尊志心朝禮煥耀太虛天尊志心朝禮洞虛浮景天尊志心朝禮無量法身天尊志心朝禮常修梵行天尊志心朝禮萬品救苦天尊志心朝禮應變無常天尊志心朝禮闡揚奧義天尊志心朝禮弘慈大量天尊志心朝禮赴緣隨應天尊志心朝禮梵行修功天尊志心朝禮託身幽寂天尊志心朝禮洞鑑無礙天尊志心朝禮玉輿巡化天尊志心朝禮赴難垂恩天尊志心朝禮日月光耀天尊志心朝禮太始凝寂天尊志心朝禮六通四達天尊志心朝禮萬願克成天尊志心朝禮應生轉世天尊志心朝禮演法垂文天尊志心朝禮常傳妙化天尊志心朝禮凝常歡喜天尊志心朝禮常住護世天尊志心朝禮普垂妙澤天尊志心朝禮體道安靜天尊志心朝禮無量道眼天尊志心朝禮常施法潤天尊志心朝禮逍遙十善天尊志心朝禮開度無量天尊志心朝禮闡法度緣天尊志心朝禮威儀湛寂天尊志心朝禮嚴潔巳身天尊志心朝禮智力威王天尊志心朝禮善達物性天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命十方常住三寶臣等懴悔六根之罪自從誕育身形染諸塵濁眼觀五色鼻嗅五香耳滯五音口貪五味籠一身而昏昧造衆罪以交羅積集愆尤標題簿籍遂使生逢禍難殁受辛酸須憑衆聖之功用滌九幽之苦今日洗心歸命面對天尊懴悔所造之業緣願冀當來之善果於是天尊復告道君言此去之後當為一切存亡衆生造諸經懴種種功德皆有次第若有衆生得吾此經香湯掃灑沐浴身心著鮮潔淨衣燒香燃燈幡華寶蓋周匝圍繞禮拜供養歡喜踊躍長跪又手護浮精進受行讀誦堅持敬奉為諸人天未聞之者皆悉遣聞未見之者皆悉遣見若有善男子善女人捨施資財請師禮懴縱有黃金如崑崙山大遍滿天地而將布施其功甚大猶復不如方便教人一句一偈經言永為身寶黃金雖貴不保我身此經雖微生死同果汝等男女勿生癡故吝此黃金竟為愛惜不修功德與身為患必無利益即是煩惱永被煎燒若能周匝作此功德見世過去一切宿罪悉皆除滅所在之處快樂逍遙淨土十方隨心願往若有出家供養三寶如斯功德不可思議諸衆生等既聞經已稽首作禮瞻仰尊顔肘行膝步擎拳義手尊奉至道晝夜精䖍誠心懴悔稽首十方常住三寶人各恭敬志心朝禮廣惠法潤天尊志心朝禮光明寶華天尊志心朝禮仙真梵行天尊志心朝禮真淨妙用天尊志心朝禮無量妙行天尊志心朝禮隨劫救苦天尊志心朝禮洞靈無上天尊志心朝禮尋聲救苦天尊志心朝禮無邊普度天尊志心朝禮勸進功德天尊志心朝禮常不輕慢天尊志心朝禮流光玄微天尊志心朝禮常善誡勸天尊志心朝禮清淨梵度天尊志心朝禮無邊名號天尊志心朝禮愍念萬兆天尊志心朝禮重威德王天尊志心朝禮保安國祚天尊志心朝禮無量顯相天尊志心朝禮常修妙行天尊志心朝禮常救解脫天尊志心朝禮窅冥護命天尊志心朝禮常無色身天尊志心朝禮無礙施行天尊志心朝禮常無染滯天尊志心朝禮弘道大意天尊志心朝禮飛行世間天尊志心朝禮靈寶洞淵天尊志心朝禮廣攝諸惡天尊志心朝禮廣常覆護天尊志心朝禮無所畏懼天尊志心朝禮不捨慈悲天尊志心朝禮常沖謙和天尊志心朝禮常湛寂然天尊志心朝禮太極靜觀天尊志心朝禮九幽挍苦天尊志心朝禮寂寞端靜天尊志心朝禮不盈滿相天尊志心朝禮常念救世天尊志心朝禮無量清淨天尊志心朝禮等觀四生天尊志心朝禮妙化無邊天尊志心朝禮大威德王天尊志心朝禮混合太無天尊志心朝禮常勝不爭天尊志心朝禮觀靜妙旨天尊志心朝禮靜默沖和天尊志心朝禮自在希微天尊志心朝禮常施感應天尊志心朝禮常無纍繫天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔至心歸命十方常住三寶臣等今復懴悔六根耽染之罪衆等耽染至重纍積不輕雖具懴陳猶疑未盡或牽拘於業網或搆結於𡨚尤目貪艷麗之姿口嗜珍羞之味耳歡絲竹之音心起愛憎手殺衆生足履盜路如斯之罪積在已身五帝四司糾彈無失玄曹長夜考對無休皆由造作之因何免填還之舋憑今懴悔願得銷融世世生生永除𡨚對天尊言若有善男子善女人得吾此經生不信想故不護淨誹謗兹甚輕慢𢘆多穢手開張葷口讀誦或隔以雜語或禮不精專卷軸未終便言畢竟泄露聖旨誑惑迷籠傲慢生心勤誠有墮或毁滅尊像敗壞靈壇不敬幡花不燃燈燭輕餐齊食侮戲尊賢汚觸道場欺淩貧下不敬師長不養慈親呵罵三光瞋嫌四氣聞善不集見惡即隨積此罪尤當來惡報或眉髮墮落遍體生瘡衣食不充賤薄唯甚死入地獄無有出期一日之中萬生萬死冥考纍受淨境不逢縱得受生永失人道或作六畜牛馬豬羊生被嫌死遭啖食或為飛鳥鴟鳶鳩鴉雖處羽毛𢘆逢怪異或為鱗甲長養池泓莫識變通惟憂枯涸或為蟲豸蠕動醯雞遇暑暫生逢寒即滅緣兹報應永失輪回灰土錙銖超生隔闊遂致沉埋九祖絶滅七玄若欲修行悔之何益衆等男女咸自思惟遇此人身各須崇奉持心孝敬秉節清齊日夜䖍䖍晨昏濟濟當保見世安樂過去生天不值惡緣皆逢善果乘兹洗懴諦受諦聽稽首皈依常住三寶太上慈悲九幽拔罪懴卷之六
