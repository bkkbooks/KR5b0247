front:
  text: 太上慈悲九幽拔罪懴卷之六木六爾時元始天尊為普救真人演說西方七寶金門皓靈皇老七氣天君金光境界無極之國利益莊嚴既竟重為演說西北方梵氣天君妙道境界其有真人名曰濟苦無極之國真仙莊嚴若人臨終之日願生彼國當潔巳清齊請師奉禮西北方應號天尊長跪懴悔滅恆沙罪障獲無量善因錬質澄神登真悟道衆等志心歸命敬禮
  hash: sha256:81dfdeb6047fc7231f72df11615801fdf41f0a35ea79283ef0da60917d0961ad
  markers:
