body:
  text: 人各恭敬志心朝禮西北方無量太華天尊志心朝禮常弘法果天尊志心朝禮寳雲妙樂天尊志心朝禮惠朗靜明天尊志心朝禮眞源妙解天尊志心朝禮分形起應天尊志心朝禮洞明世界天尊志心朝禮應現眞身天尊志心朝禮无邊智惠天尊志心朝禮隨物應形天尊志心朝禮應現色身天尊志心朝禮上品妙成天尊志心朝禮降邪滅惡天尊志心朝禮无方化度天尊志心朝禮常龍徳變天尊志心朝禮廣常慈愛天尊志心朝禮煥耀太虚天尊志心朝禮洞虛浮景天尊志心朝禮无量法身天尊志心朝禮常修梵行天尊志心朝禮萬品救苦天尊志心朝禮應變无常天尊志心朝禮闡揚奥義天尊志心朝禮弘慈大量天尊志心朝禮赴縁隨應天尊志心朝禮梵行修功天尊志心朝禮託身幽寂天尊志心朝禮洞鑑无礙天尊志心朝禮玉輿廵化天尊志心朝禮赴難垂恩天尊志心朝禮日月光耀天尊志心朝禮太始凝寂天尊志心朝禮六通四達天尊志心朝禮萬願克成天尊志心朝禮應生轉世天尊志心朝禮演法垂文天尊志心朝禮常傳妙化天尊志心朝禮凝常歡喜天尊志心朝禮常住護世天尊志心朝禮普垂妙澤天尊志心朝禮體道安靜天尊志心朝禮無量道眼天尊志心朝禮常施法潤天尊志心朝禮逍遙十善天尊志心朝禮開度無量天尊志心朝禮闡法度縁天尊志心朝禮威儀湛寂天尊志心朝禮嚴潔巳身天尊志心朝禮智力威王天尊志心朝禮善達物性天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔志心歸命十方常住三寳臣等懴悔六根之罪自從誕育身形染諸塵濁眼觀五色鼻齅五香耳滯五音口貪五味籠一身而昏昧造衆罪以交羅積集愆尤標題簿籍遂使生逢禍難殁受辛酸須憑衆聖之功用滌九幽之苦今日洗心歸命面對天尊懴悔所造之業縁願冀當來之善果於是天尊復吿道君言此去之後當爲一切存亡衆生造諸經懴種種功徳皆有次第若有衆生得吾此經香湯掃灑沐浴身心着鮮潔淨衣燒香燃燈旛華寶蓋周帀圍繞禮拜供養歡喜踊躍長跪又手護浮精進受行讀誦堅持敬奉爲諸人天未聞之者皆悉遣聞未見之者皆悉遣見若有善男子善女人捨施資財請師禮懴縱有黄金如崑崙山大遍滿天地而將布施其功甚大猶復不如方便教人一句一偈經言永爲身寳黃金雖貴不保我身此經雖微生死同果汝等男女勿生癡故恡此黄金竟爲愛惜不修功徳與身爲患必无利益即是煩惱永被煎燒若能周帀作此功徳見世過去一切宿罪悉皆除滅所在之處快樂逍遙淨土十方隨心願徃若有出家供養三寳如斯功德不可思議諸衆生等旣聞經已稽首作禮瞻仰尊顔肘行膝歩擎拳义手尊奉至道晝夜精䖍誠心懴悔稽首十方常住三寳人各恭敬志心朝禮廣惠法潤天尊志心朝禮光明寳華天尊志心朝禮仙眞梵行天尊志心朝禮眞淨妙用天尊志心朝禮無量妙行天尊志心朝禮隨劫救苦天尊志心朝禮洞靈无上天尊志心朝禮尋聲救苦天尊志心朝禮無邊普度天尊志心朝禮勸進功徳天尊志心朝禮常不輕慢天尊志心朝禮流光玄微天尊志心朝禮常善誡勸天尊志心朝禮清淨梵度天尊志心朝禮無邊名號天尊志心朝禮愍念萬兆天尊志心朝禮重威德王天尊志心朝禮保安國祚天尊志心朝禮无量顯相天尊志心朝禮常修妙行天尊志心朝禮常救解脫天尊志心朝禮窅冥護命天尊志心朝禮常无色身天尊志心朝禮無礙施行天尊志心朝禮常無染滯天尊志心朝禮弘道大意天尊志心朝禮飛行世間天尊志心朝禮靈寳洞淵天尊志心朝禮廣攝諸惡天尊志心朝禮廣常覆護天尊志心朝禮无所畏懼天尊志心朝禮不捨慈悲天尊志心朝禮常沖謙和天尊志心朝禮常湛寂然天尊志心朝禮太極靜觀天尊志心朝禮九幽挍苦天尊志心朝禮寂寞端靜天尊志心朝禮不盈滿相天尊志心朝禮常念救世天尊志心朝禮无量清淨天尊志心朝禮等觀四生天尊志心朝禮妙化無邊天尊志心朝禮大威徳王天尊志心朝禮混合太无天尊志心朝禮常勝不爭天尊志心朝禮觀靜妙旨天尊志心朝禮靜默沖和天尊志心朝禮自在希微天尊志心朝禮常施感應天尊志心朝禮常无累繫天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔至心歸命十方常住三寳臣等今復懴悔六根躭染之罪衆等躭染至重累積不輕雖具懴陳猶疑未盡或牽拘於業網或搆結於𡨚尤目貪艶麗之姿口嗜珍羞之味耳歡絲竹之音心起愛憎手殺衆生足履盜路如斯之罪積在已身五帝四司糺彈无失玄曹長夜考對無休皆由造作之因何免塡還之舋憑今懴悔願得銷融世世生生永除𡨚對天尊言若有善男子善女人得吾此經生不信想故不護淨誹謗兹甚輕慢𢘆多穢手開張葷口讀誦或隔以雜語或禮不精專卷軸未終便言畢竟泄露聖旨誑惑迷籠傲慢生心勤誠有墮或毁滅尊像敗壞靈壇不敬旛花不燃燈燭輕飡齋食侮戲尊賢汚觸道場欺淩貧下不敬師長不養慈親呵罵三光瞋嫌四氣聞善不集見惡即隨積此罪尤當來惡報或眉髪墮落遍體生瘡衣食不充賤薄唯甚死入地獄無有出期一日之中萬生萬死冥考累受淨境不逢縱得受生永失人道或作六畜牛馬豬羊生被嫌死遭啖食或爲飛鳥鴟鳶鳩鴉雖處羽毛𢘆逢怪異或爲鱗甲長養池泓莫識變通惟憂枯涸或爲蟲豸蠕動醯鷄遇暑暫生逢寒即滅縁兹報應永失輪迴灰土錙銖超生隔闊遂致沉埋九祖絶滅七玄若欲修行悔之何益衆等男女咸自思惟遇此人身各須崇奉持心孝敬秉節清齊日夜䖍䖍晨昏濟濟當保見世安樂過去生天不值惡縁皆逢善果乗兹洗懴諦受諦聽稽首皈依常住三寳太上慈悲九幽拔罪懴卷之六
