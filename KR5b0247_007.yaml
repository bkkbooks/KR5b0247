body:
  text: 人各恭敬志心朝禮北方玄上玉晨天尊志心朝禮善緣勸化天尊志心朝禮升入妙境天尊志心朝禮應化不倦天尊志心朝禮玄微莫測天尊志心朝禮柔弱至氣天尊志心朝禮金華廣耀天尊志心朝禮廣化三界天尊志心朝禮住無名相天尊志心朝禮冶錬化身天尊志心朝禮沖虛靜默天尊志心朝禮大有見容天尊志心朝禮玄都湛寂天尊志心朝禮散景羅天天尊志心朝禮常無疑辨天尊志心朝禮應權方便天尊志心朝禮靈真惠寂天尊志心朝禮四梵行化天尊志心朝禮無窮色像天尊志心朝禮無極義海天尊志心朝禮體證金剛天尊志心朝禮海量惠王天尊志心朝禮常惠廣度天尊志心朝禮普入妙樂天尊志心朝禮寶華流明天尊志心朝禮普通津梁天尊志心朝禮廣乘道惠天尊志心朝禮常靜妙觀天尊志心朝禮證寂妙相天尊志心朝禮勸化無邊天尊志心朝禮絶言光相天尊志心朝禮凝湛常無天尊志心朝禮善致福樂天尊志心朝禮道德弘普天尊志心朝禮無障礙意天尊志心朝禮無等空寂天尊志心朝禮善證道惠天尊志心朝禮善破四魔天尊志心朝禮善除生死天尊志心朝禮妙光真理天尊志心朝禮聖力無邊天尊志心朝禮飛丹照極天尊志心朝禮上玄沖用天尊志心朝禮金真精應天尊志心朝禮無生滅相天尊志心朝禮至道應世天尊志心朝禮功德本藏天尊志心朝禮常弘正道天尊志心朝禮靜法無礙天尊志心朝禮廣大慈悲天尊志心朝禮誓弘真理天尊志心朝禮常融觀惠天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命十方常住三寶臣等懴悔五逆不孝之罪衆等爰從輪轉便託胞胎沉重難懷喘息無定父娘驚懼𢘆畏損傷及至分形方難看視如斯恩育何以還酬或曽不敬慈親翻成五逆應對罵詈抵拒揚言當面猶嗔背身奚順氣性剛强智見粗踈不狎朋友唯生倨傲甘鮮不獻禮樂何施空負劬勞孰伸孝敬如斯𠎝咎咸乞懴除天尊言若有善男子善女人生為不孝死後思酬若演真經必能洗蕩既聞妙典讀誦堅修護淨燒香秉持心口浴身沐首易食更衣兢兢不虧道心增長不生懈怠𢘆懷欣戴踊躍長齊修心入靖忍辱受戒布施行慈供養出家歸依三寶放生贖命濟拔亡魂愛老憐貧矜孤恤寡施及貧下敬奉尊親一切慈心平等無二或遇三元八節甲子庚申本命良辰誕生吉日皆可精嚴像設羅列薰羞贖罪於衆聖之前滌舋於積生之內故得已往者超神有自見存者受慶無窮其或輕淩於天真地聖呰毀於靈文寶典傷殘無度貪愛彌深為臣不忠為子不孝縱情極欲口是心非須向道前明伸宣懴則必致朱篇記善黑籍除愆當禮十方應號天尊長跪懴悔免恆沙罪障獲無量善因衆等至心歸命敬禮人各恭敬志心朝禮勇猛斷惑天尊志心朝禮威德重光天尊志心朝禮增長壽惠天尊志心朝禮廣深智惠天尊志心朝禮無邊上善天尊志心朝禮遍覺知恩天尊志心朝禮妙思微逺天尊志心朝禮恬和柔惠天尊志心朝禮忘功濟物天尊志心朝禮靈玄靜觀天尊志心朝禮託現清宫天尊志心朝禮光普容覺天尊志心朝禮妙應權機天尊志心朝禮萬變隨時天尊志心朝禮精感至誠天尊志心朝禮妙宰沖用天尊志心朝禮永成無漏天尊志心朝禮無極快樂天尊志心朝禮常寂不動天尊志心朝禮制命長存天尊志心朝禮散威形影天尊志心朝禮最上功德天尊志心朝禮智惠藏王天尊志心朝禮沖安清淨天尊志心朝禮降魔度衆天尊志心朝禮布化無邊天尊志心朝禮遍光八極天尊志心朝禮勸行不退天尊志心朝禮永離愛欲天尊志心朝禮輪轉萬變天尊志心朝禮洞玄冥寂天尊志心朝禮至道不渝天尊志心朝禮神威禁約天尊志心朝禮永超生死天尊志心朝禮不住法界天尊志心朝禮妙法流通天尊志心朝禮智惠逺覃天尊志心朝禮端靜處世天尊志心朝禮靜默無為天尊志心朝禮三界宗元天尊志心朝禮精進化世天尊志心朝禮寂寥善入天尊志心朝禮威儀庠雅天尊志心朝禮善開玄關天尊志心朝禮常大濟度天尊志心朝禮正法威王天尊志心朝禮還神寂寞天尊志心朝禮廣流惠愛天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命十方常住三寶臣等懴悔五逆不孝之罪但以髮膚成長不可毀傷禮義施為咸有儀則多緣性行或不遵承失義忘親踈姻背屬敬上有闕念下多乖手足相踈親戚違背或憎嫌相薄或狠恚相深如上𡨚愆何由懴滌爾時元始天尊告虛皇道君言若有善男子善女人自從曠劫以來至于今日三業之罪五逆之非積疊無邊如山比嶽無因懴雪不值良緣恣縱狂言欺心誷道輕忽三寶誹謗聖文指逺誓言牽神呪咀呵風罵雨冒觸三光不孝尊親不敬天地展轉迷惑纍劫纒綿縱遇經科罔知懴滌欲超淨境不入邪門汝等善男子善女人能捨家資財請師禮懴持齊入靜潔已修心叩禮䖍祈燒香行道散華供養護淨莊嚴或為追逺薦亡或為消災請福或為七玄九祖或為父母兄弟或為交友親知或為已身眷屬一切冥寞三界舍生說如上因緣禮天尊名號即得先亡解脫災厄潜消九祖升騰父母超適交朋顯耀眷屬諧和冥寞慈柔舍生離苦弘慈普廕惠澤遍霑堅固修持善緣增進傍羅八表遍及遐方宿業餘殃咸成解脫諦聽諦受無使懈違汝等男女各相誘勸始終一貫內外咸符精進依行稽首而退太上慈悲九幽拔罪懴卷之七
