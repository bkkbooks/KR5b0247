front:
  text: 太上慈悲九幽拔罪懴卷之七木七爾時元始天尊為普救真人演說西北方梵氣天君妙道境界無極之國利益莊嚴既竟重為演說北方洞隂朔單鬱絶五靈玄老五氣天君定真境界其有真人名曰救苦無極之國救度莊嚴若人臨終之日願生彼國當潔巳清齊請師奉禮北方應號天尊長跪懴悔免恆沙罪障獲無量善因錬質澄神登真悟道衆等志心歸命敬禮
  hash: sha256:13214e73690f1c4b48e4029a29e1d072c983da987f2c8c21b06dace4e6724543
