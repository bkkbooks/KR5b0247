front:
  text: 太上慈悲九幽拔罪懴卷之八木八爾時元始天尊為普救真人演説北方洞隂朔單鬱絶五靈玄老五氣天君真定境界無極之國救度莊嚴既竟重為演説東北方梵氣天君長樂境界其有真人名曰妙音無極之國周匝莊嚴若人臨終之日願生彼國當潔已清齋請師奉禮東北方應號天尊長跪懴悔滅恆沙罪障獲無量善因鍊魄朱陵遊神紫府衆等至心歸命敬禮
  hash: sha256:e79255074273de76eeab4fe70bff48465e3bfa85ee490c4fbf85b6eea446d1fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_008-001a, image: hfl/0301/0301-022.png}
body:
  text: 人各恭敬志心朝禮東北方度仙上聖天尊志心朝禮智惠無盡天尊志心朝禮大智成就天尊志心朝禮歡喜清淨天尊志心朝禮定生延壽天尊志心朝禮廣度沉淪天尊志心朝禮積功成聖天尊志心朝禮凝神照境天尊志心朝禮和神利物天尊志心朝禮總領衆靈天尊志心朝禮幽照無極天尊志心朝禮善斷迷惑天尊志心朝禮瓊瑤寶蓋天尊志心朝禮朱景洞照天尊志心朝禮體悟萬德天尊志心朝禮大洞淵微天尊志心朝禮萬行圓滿天尊志心朝禮無極玉皇天尊志心朝禮太乘空惠天尊志心朝禮清淨遺慈天尊志心朝禮還功報德天尊志心朝禮隱迹全道天尊志心朝禮法體圓滿天尊志心朝禮髙上玉皇天尊志心朝禮紫霞浮蓋天尊志心朝禮玄智逺照天尊志心朝禮法雲流潤天尊志心朝禮闡揚妙化天尊志心朝禮行圓空界天尊志心朝禮感降慈緣天尊志心朝禮湛寂體玄天尊志心朝禮玉京垂惠天尊志心朝禮保度應權天尊志心朝禮太微光範天尊志心朝禮真相具足天尊志心朝禮法緣常濟天尊志心朝禮勸化無礙天尊志心朝禮大光恆照天尊志心朝禮道氣舍育天尊志心朝禮降伏強良天尊志心朝禮延光布像天尊志心朝禮永證道源天尊志心朝禮志節微妙天尊志心朝禮常傳真戒天尊志心朝禮道惠圓滿天尊志心朝禮光德具足天尊志心朝禮無量慈惠天尊志心朝禮沖和靜樂天尊志心朝禮玄隱無為天尊志心朝禮幽源不測天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命東北方無上天尊懴悔受經破戒之罪衆等自從無量劫來至于今日捨生受生受諸報應或曾尊受經戒三戒五戒九戒十戒十二可從戒二十四戒一百八十戒三百大戒或曽親受或見人受皆不信敬恆起慢心穢犯過多誹謗非一以同戲謔曽不護持言行有違書寫不敬讀誦訛謬文字參差或曽讀上清經靈寶經正一經道德經西升經黃庭經內觀經太平經消災經報恩經九幽經救苦經及諸經戒或曽讀誦或見人讀誦以為輕戲不起虔心侮聖人言笑大道義或供養有闕或保護不專或書寫紙墨怯惡裝潢卷軸欹斜或脫落真文或揩攺義理都緣愚昧是有乖儀浮世不堅懴陳未遇今遇大道懇願消除天尊言如上罪緣其尤最甚如不懴洗永失輪回若未終年即遇惡疾形骸劣弱肌骨尫殘氣息微羸言辭拙惡禮貌乖差去就生踈或已壽終難逢淨土遊魂北岱量罪重輕以其報對苦惱無窮輪回無計種種捶考楚毒難言啼呌難言呻吟莫及痛來傷骨熱即連心劒樹千尋攀緣須上鑊湯百沸積壓須沉消爛形軀晝夜不捨何緣託廕無可受生如此罪源惣由前作汝等男女各自省心勤奉至真當求後果請禮經懴使入福田巳亡者早得生天未終者皆希安樂諦聽諦受依法修行懴悔道前志心敬禮人各恭敬志心朝禮坤元保大天尊志心朝禮后載博物天尊志心朝禮無邊善達天尊志心朝禮利育群生天尊志心朝禮遐宣道廕天尊志心朝禮設大慈惠天尊志心朝禮去住無相天尊志心朝禮陶化四生天尊志心朝禮太虛常寂天尊志心朝禮紫極觀相天尊志心朝禮澄真靜意天尊志心朝禮紫府凝神天尊志心朝禮恆遊寂處天尊志心朝禮信樂正法天尊志心朝禮勝華潛耀天尊志心朝禮默念無為天尊志心朝禮髙真定智天尊志心朝禮玄臺勤功天尊志心朝禮羣靈普護天尊志心朝禮揮靈妙用天尊志心朝禮凝神生惠天尊志心朝禮慈教廣度天尊志心朝禮教度八難天尊志心朝禮延壽無盡天尊志心朝禮寂住玄都天尊志心朝禮和光隱妙天尊志心朝禮窈冥神光天尊志心朝禮清淨真惠天尊志心朝禮東華廣德天尊志心朝禮至極安樂天尊志心朝禮端靖凝和天尊志心朝禮最勝妙果天尊志心朝禮善救世界天尊志心朝禮湛相淳寂天尊志心朝禮應念救生天尊志心朝禮百寶勝嚴天尊志心朝禮廣啓神化天尊志心朝禮髙虛最妙天尊志心朝禮廣化玄宗天尊志心朝禮南丹輝惠天尊志心朝禮朱靈寶德天尊志心朝禮妙力寶王天尊志心朝禮虛極垂感天尊志心朝禮具教方便天尊志心朝禮慈和忍愛天尊志心朝禮尊貴無邊天尊志心朝禮寧撫萬神天尊志心朝禮晏豫景像天尊志心朝禮總朝上帝天尊志心朝禮玄理垂文天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命東北方無上天尊懴悔破齋毀道之罪衆等自從無始劫來至于今日捨身受身受諸報應或曾修設齋醮餐啖齋食不生敬信或修上清齋金籙齋黃籙齋靈寶齋三元齋北帝齋八節齋十直齋五臘齋庚申齋本命齋如是等齋或曽親設或曽親受雖言名目不起敬心多有觸犯或將葷辛混雜腥穢同厨不潔巳身但多慢易過中更食宿心不精誹謗至真將同邪偽言猶虛誕心豈虔恭如上罪根稱量最重死入地獄無有生全或入酆都山二十四地獄或入監天地獄虛天地獄元正地獄玄沙地獄北緣地獄刑正地獄律令地獄九天地獄青冥地獄天一地獄河伯地獄纍劫地獄女青地獄如是等二十四獄三寶五靈三官九府一百二十曹千二百掾吏執罰神兵五萬人考掠罪魂或足履刀山或手攀劒樹或抱銅柱或卧鐵床頭頂火山身負鐵杖飢則食炭渴飲鎔銅或入鑊湯或經爐炭碓搗磑磨倒懸立鋸或硤石逼身針鋒貫體足下煨燒臂間杻鎖天尊言如斯罪類報應分明若有善男子善女人得悟此經心生信向清淨供養禮拜燒香乞滅三塗冥司罪纍億曽萬祖過往亡靈爰及己身見存眷屬所纒殃過請乞解紛即遣飛天神人齎九龍之符命歷諸地獄悉令蕩滌咸使消除回向發心增修上善稽首歸依十方常住三寶太上慈悲九幽拔罪懴卷之八
