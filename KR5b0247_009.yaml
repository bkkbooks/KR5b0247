front:
  text: 太上慈悲九幽抜罪懴卷之九木九爾時元始天尊爲普救眞人演說東北方梵炁天君長樂境界旡極之國周帀莊嚴旣竟重爲演說上方玄都玉京紫微金闕七寳玄臺三清三界三十二天帝君妙行眞人神仙玉女自然无極之國紫霄莊嚴若人臨終之日願生彼國當潔已清齋請師奉禮上方應號天尊長跪懴悔滅恒沙罪障獲無量善因錬質澄神登眞悟道衆等志心歸命敬禮
  hash: sha256:1c71c0454e605274ce02a5075465ddf22fd1ed138d142668f6036560f3218398
