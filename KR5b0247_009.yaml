body:
  text: 人各恭敬志心朝禮上方玉虛明皇天尊志心朝禮西𨙻靈應天尊志心朝禮善導洪源天尊志心朝禮雲華見相天尊志心朝禮凝寂金闕天尊志心朝禮善消魔試天尊志心朝禮萬道無爲天尊志心朝禮喜悟善道天尊志心朝禮靜念和光天尊志心朝禮善應逺感天尊志心朝禮常守正觀天尊志心朝禮超勝萬法天尊志心朝禮授道津梁天尊志心朝禮開照上眞天尊志心朝禮妙相玄範天尊志心朝禮浮空布化天尊志心朝禮天寳施惠天尊志心朝禮廣積善行天尊志心朝禮福智成就天尊志心朝禮相好竒妙天尊志心朝禮常守定惠天尊志心朝禮常住无爲天尊志心朝禮應化齊均天尊志心朝禮惠觀澄元天尊志心朝禮玉華流煥天尊志心朝禮金光晃耀天尊志心朝禮常湛玉清天尊志心朝禮常無礙惠天尊志心朝禮變錬有形天尊志心朝禮玉妙有極天尊志心朝禮靜觀儀形天尊志心朝禮玄通惠域天尊志心朝禮威神无邊天尊志心朝禮長存无極天尊志心朝禮普垂惠澤天尊志心朝禮觀行成滿天尊志心朝禮惠力無邊天尊志心朝禮應感去來天尊志心朝禮大乗敷化天尊志心朝禮忘心空寂天尊志心朝禮善積智圓天尊志心朝禮彌綸萬化天尊志心朝禮玄化積徳天尊志心朝禮傳眞證寂天尊志心朝禮大道無礙天尊志心朝禮普照冥空天尊志心朝禮淨至无染天尊志心朝禮惠敬心玄天尊志心朝禮常無彼我天尊志心朝禮聖位増進天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔志心歸命十方常住三寳臣等懴悔瞋怒愚癡之罪自從无量劫來至于今日父母兄弟巳身眷屬捨生受生曽無慚愧起瞋怒心或怒大道言乏正眞秪起浮辭𢘆无信意或怒天地呪咀寒暑但積愚頑不慚覆載或怒日月祼露身形不愧照臨常嫌遲疾或怒經典稱是虛言不解披尋多生誑毀或怒父母侍奉乖違孝養全無劬勞不報或怒兄弟義乏連枝看若外人恩同踈友或怒眷屬不起慈柔敬上有乖撫下無節或怒齋戒修奉不恭觸犯常多精䖍有闕或怒國主不讃昇平殺逆生心忠良不立或怒講說不聽善縁但起惡言混雜眞理或怒宫觀敬奉不生誹謗過多施捨殊闕或怒先逝竟乏追修不作良善助其冥路或怒神理無有祭祈却信邪言便行婬祀或怒老耄不生孝心施惠豈曽侮慢唯作或怒六疾不發慈心但出惡言稱遭業報或怒牢獄不察言情𢘆說艱難𦔳其杻械或怒貧賤枉壓无申不念飢寒每生苦楚或怒禽獸不念羽毛祇縱貪婪唯求烹宰天尊言如是愚癡瞋怒其罪滋深不露懴宣必沉惡道是使先亡幽縶見在遭疾種種𡨚讎悉皆臻湊汝等男女各發精誠今日向十方天尊前稽顙投誠皆乞懴悔歸命三寳人各恭敬志心朝禮法源長逺天尊志心朝禮隨順得悟天尊志心朝禮廣大无邊天尊志心朝禮常住法要天尊志心朝禮妙頥玄通天尊志心朝禮觀等无礙天尊志心朝禮遍行世界天尊志心朝禮惠觀弘通天尊志心朝禮永絶塵累天尊志心朝禮超眞解脫天尊志心朝禮大弘普濟天尊志心朝禮寳洞垂光天尊志心朝禮脫離垢濁天尊志心朝禮七寳光明天尊志心朝禮寳惠延慈天尊志心朝禮歸用澄靜天尊志心朝禮見大威力天尊志心朝禮普護舍生天尊志心朝禮降伏羣魔天尊志心朝禮飛軒赴感天尊志心朝禮妙眞弘教天尊志心朝禮愍濟无常天尊志心朝禮至極玄覆天尊志心朝禮饒益一切天尊志心朝禮照用歸空天尊志心朝禮眞性常湛天尊志心朝禮示縁開化天尊志心朝禮玄門啓袐天尊志心朝禮習妙玄同天尊志心朝禮洞眞髙惠天尊志心朝禮淨業无邊天尊志心朝禮妙空凝定天尊志心朝禮寳質純素天尊志心朝禮法力致大天尊志心朝禮功行常圓天尊志心朝禮金眞寳善天尊志心朝禮凝常用一天尊志心朝禮靈響普通天尊志心朝禮常樂空同天尊志心朝禮存爲道化天尊志心朝禮遊宴三清天尊志心朝禮法惠流通天尊志心朝禮解脫无名天尊志心朝禮眞淨遍習天尊志心朝禮清逺淨徳天尊志心朝禮増進階級天尊志心朝禮教揚碧落天尊志心朝禮慈誨悟縁天尊志心朝禮飛昇頂極天尊志心朝禮永離有无天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔志心歸命十方常住三寳懴悔殺生之罪衆等自從無量劫來至于今日父母兄弟已身眷屬捨身受身无量生身所處人倫未離愛欲不逢善友不遇明師種習而成薰蕕所染造諸惡業恣意殺生或殺牛羊㹠犬麞鹿狐兔六畜等物曽无憫物唯務充腸其或殺戮鳧鴈雞鵝之𩔖或以羅網籠𦋇一切飛禽之𩔖或以𦌝繳張捕水陸鱗甲走獸之𩔖或焚山燒野傷害舍靈或作堰開池損動蟄伏或摧巢破卵探穴取雛使子母分離藏竄无地或充口腹或恣无辜日徃月來結成𡨚對或自作或教他凡此過尤不可稱說致使殃延眷屬禍及已身或減折壽年或縈纒疾瘵一沉長夜永劫難原如此之徒皆由積惡不憑懴拔何致蠲除天尊言道以好生法弘開度凡有此等或謝人寰見在子孫急冝薦導掃灑庭宇齋沐身心邀請法師建兹勝會廣營香燭羅列旙華瞻禮尊顔轉讀經懴旋回法座讃詠歩虛瀝膽披肝首𠎝謝過精誠祈請晝夜忘疲則徃逝先靈必蒙原赦永離幽暗克入光明魂識安寧讎罷對遷神洞府鍊質南宫悟道登眞福生禍滅汝等男女宜當諦聽遵受奉行發回向心登无上道太上慈悲九幽拔罪懴卷之九
