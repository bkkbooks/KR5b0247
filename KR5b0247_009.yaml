front:
  text: 太上慈悲九幽拔罪懴卷之九木九爾時元始天尊為普救真人演説東北方梵氣天君長樂境界旡極之國周匝莊嚴既竟重為演説上方玄都玉京紫微金闕七寶玄臺三清三界三十二天帝君妙行真人神仙玉女自然無極之國紫霄莊嚴若人臨終之日願生彼國當潔已清齋請師奉禮上方應號天尊長跪懴悔滅恆沙罪障獲無量善因錬質澄神登真悟道衆等志心歸命敬禮
  hash: sha256:30cfb793c872588729248743aa4274728b1c3cf068500f58352d9b3fc4a3f303
