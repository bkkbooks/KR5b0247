front:
  text: 太上慈悲九幽拔罪懴卷之十木十爾時元始天尊為普救真人演說上方玄都玉京紫微金闕七寶玄臺三清三界三十二天帝君妙行真人神仙玉女自然無極之國紫霄莊嚴既竟重為演說下方九土髙皇四司五帝十二仙卿九宫真人神仙玉女水運丹界其有真人名曰妙行極樂之國淨土莊嚴若人臨終之日願生彼國當潔已清齊請師奉禮下方應號天尊長跪懴悔免恆沙罪障獲無量善因錬魄朱陵遊神紫府衆等志心歸命敬禮
  hash: sha256:af10489471b2aa72dffb67c5ce5b5b1f2f13ab8295f648d00da65c12970ec18d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_010-001a, image: hfl/0301/0301-060.png}
body:
  text: 人各恭敬志心朝禮下方真皇洞神天尊志心朝禮法雨潤益天尊志心朝禮普度災難天尊志心朝禮知常容衆天尊志心朝禮常用道德天尊志心朝禮控御法輪天尊志心朝禮護度無量天尊志心朝禮還魂起死天尊志心朝禮長生保命天尊志心朝禮隨願往生天尊志心朝禮妙寶上真天尊志心朝禮開明祖劫天尊志心朝禮普殖化生天尊志心朝禮上極妙容天尊志心朝禮梵氣普生天尊志心朝禮周回度世天尊志心朝禮大慈延壽天尊志心朝禮圓極證空天尊志心朝禮嚴校主録天尊志心朝禮削除罪譴天尊志心朝禮威權自在天尊志心朝禮超淩仙界天尊志心朝禮乘神濟物天尊志心朝禮舟航苦海天尊志心朝禮保舉監生天尊志心朝禮圓明智勝天尊志心朝禮無我惠通天尊志心朝禮緣慈親善天尊志心朝禮威制群魔天尊志心朝禮乘真御運天尊志心朝禮景化凝玄天尊志心朝禮示現萬像天尊志心朝禮還元歸寂天尊志心朝禮安樂常保天尊志心朝禮舍生護命天尊志心朝禮主録保年天尊志心朝禮安鎮舍識天尊志心朝禮回靈養素天尊志心朝禮開度宿障天尊志心朝禮保命延生天尊志心朝禮終劫濟苦天尊志心朝禮演流萬範天尊志心朝禮運度八難天尊志心朝禮威景金真天尊志心朝禮一氣元經天尊志心朝禮太皇鬱秀天尊志心朝禮託化生因天尊志心朝禮混合萬靈天尊志心朝禮玄會八冥天尊志心朝禮髙真上智天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命下方無上天尊懴悔偷盜之罪衆等自從無量劫來至于今日父母兄弟已身眷屬捨身受身無量生身受諸報應切慮不存廉直起諸盜心或盜天尊大道供養財物乃至硨磲碼瑙琉璃琥珀明珠璧玉銅鐵金銀錦綺綾羅器用信施齊食米麵供養香油或直一文十文百文千文乃至纎粟俱有重罪或盜國王財物乃至割庫逾墻開封擊鎖攺換印綬移拆簽函戎備軍資稅賦科匹一文一寸以少及多不務輸公唯思利已如斯侵竊皆有𠎝尤或曾偷盜宫觀起造財物法師鎮信物色經典裝裭之物法服栽割之物行壇布施之物新鮮未獻之物慈親眷愛之物鄉閭鄰里之物孤貧老弱之物三寶華果之物十方供設之物經求貨易之物田農種播之物乃至一切所為之物或偷盜或隱藏不計多少皆有罪負未常覺悟咸乞懴除天尊言若有善男子善女人過去今生不弘正道但起癡心偷竊為先剝削利已積多過類損失身命殃及九玄災延七祖生遭惡疾死入重泉計罪量功即當受報汝等男女各生追想咸洗前非禮懴持經設齊奉戒勤心首謝當得消除懴悔道前免離諸苦志心敬禮人各恭敬志心朝禮浩劫玉虛天尊志心朝禮流津布氣天尊志心朝禮惣持衆行天尊志心朝禮元梵度人天尊志心朝禮洞幽凝寂天尊志心朝禮天真太妙天尊志心朝禮乘願往生天尊志心朝禮法橋大度天尊志心朝禮惠覺通元天尊志心朝禮太極妙容天尊志心朝禮招真㑹聖天尊志心朝禮定光景耀天尊志心朝禮觀明太虛天尊志心朝禮真要匠道天尊志心朝禮龍章萬變天尊志心朝禮威光朗照天尊志心朝禮觀玄品量天尊志心朝禮玉真梵景天尊志心朝禮大明七曜天尊志心朝禮玄素保光天尊志心朝禮景德沖用天尊志心朝禮巡虛飛步天尊志心朝禮十華上願天尊志心朝禮大安梵度天尊志心朝禮虛明惣鍳天尊志心朝禮神真妙用天尊志心朝禮玄功周濟天尊志心朝禮玉明玄覺天尊志心朝禮梵氣彌羅天尊志心朝禮通玄萬範天尊志心朝禮十聖輪回天尊志心朝禮長生護命天尊志心朝禮普修萬行天尊志心朝禮延和正化天尊志心朝禮廣運慈善天尊志心朝禮善濟智成天尊志心朝禮遍空玄解天尊志心朝禮玄機冥寂天尊志心朝禮空惠弘通天尊志心朝禮洞虛惠聖天尊志心朝禮建德明和天尊志心朝禮常善救物天尊志心朝禮妙樂無等天尊志心朝禮契寂升玄天尊志心朝禮興和德化天尊志心朝禮崇仙布善天尊志心朝禮慈愛愍苦天尊志心朝禮開濟四生天尊志心朝禮弘仙廣廕天尊志心朝禮上德普聞天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寶巳復次懴悔志心歸命下方無上天尊懴悔毀壞之罪衆等自從無量劫來至于今日父母兄弟已身眷屬捨身受身無量生身不效忠良多懷毀損或毀壞天尊大道形像或毀壞宫觀靈壇玄域或毀壞公廨㕔堂或毀壞大藏經書或毀壞供養器具或毀壞社稷靈祠乃至一切器宇物具不生修奉但積損傷建造之功其功不一毀壞之意舉念何難積疊愆尤咸希懴悔天尊言起心著意有善有非報德酬愆有福有禍譬如聲響其應如何言凶則氣粗聲和則意悅汝等男女咸自思惟敬信為先莊嚴是首如能悔過須慕正真勤發道心廣禮經懴即得存亡獲福生死蒙恩精懇投誠至心懴悔爾時元始天尊時遊十方世界放大光明照諸國土與虛皇道君分身下界安坐碧霞神光寶座為普救真人演說十方男女因緣事畢寂絶影響不知所之普救真人及諸男女等追慕傷嗟叩頭禮拜謹依演示次第修行遂得善信男女銜恩洗雪死者蒙祐升上天堂生者獲恩常居樂土遂使隂陽和順國家清寧蝖飛乘普度之功蝽動賴生成之惠於是三塗五苦餓鬼孤魂悉得超生皆歸解脫人天仰荷家國依憑稽首十方常住三寶太上慈悲九幽拔罪懴卷之十
