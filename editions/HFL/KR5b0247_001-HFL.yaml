front:
  text: 太上慈悲九幽拔罪懴卷之一木一爾時元始天尊時遊十方世界天上地下無所不經至大福堂國見虚皇道君爲十方國土一切衆生善男女等心生猒故遂即分身應變口吐五色瓊光遍照十方无不明徹爾時男女及諸四衆晝夜惶懼悲聲歎泣瞻仰尊顔稽首頂禮叩頭博顙肘行膝歩諸禽雜獸並皆如是一切衆生諸方仰視寂絶形影莫知所尋爾時虚皇道君慈愍衆生分身下界安坐碧霞神寳之座念彼衆生如常說法演教化人一切含靈及諸禽獸皆來詣座稽首作禮歩歩而前重遇道君歡喜踧踖是時座下有一真人名曰普救從衆中出稽首作禮上白天尊願聞演說十方男女生可獲福死得受生作何因縁得遂本願天尊告曰汝可復坐靜念在心一切因縁吾爲解說天尊言十方世界皆有天堂若有男女常禮十方應號天尊當生可獲福死得受生於是普救眞人及諸四軰長跪齊心而聽演說爾時天尊先說東方青靈始老蒼帝九炁天君華林境界其有眞人名曰靜境无極之國惠靜莊嚴若人臨終之日願生彼國當禮東方應號天尊長跪懴悔免恒沙罪障獲无量善因錬質澄神登眞悟道衆等至心今當敬禮
  hash: sha256:31fa38737f62e71251cbbf952cf2bfc76a49c3dc5b57f7fa5605791015b0c6ff
