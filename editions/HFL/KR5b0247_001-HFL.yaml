body:
  text: 人各恭敬志心朝禮慈悲三寳天尊志心朝禮尋聲救苦天尊志心朝禮東方玉寳皇上天尊志心朝禮普慈護國天尊志心朝禮大忍無礙天尊志心朝禮東華上相天尊志心朝禮清宫演化天尊志心朝禮仙靈妙寳天尊志心朝禮含和虚極天尊志心朝禮九天積善天尊志心朝禮皇上眞老天尊志心朝禮元靈隱曜天尊志心朝禮金闕玉童天尊志心朝禮凝心玄應天尊志心朝禮靈都大度天尊志心朝禮玄靈至徳天尊志心朝禮髙上太虚天尊志心朝禮圓通妙極天尊志心朝禮開明眞相天尊志心朝禮寳勝元和天尊志心朝禮寳藏圓極天尊志心朝禮玄明眞定天尊志心朝禮衆智成滿天尊志心朝禮金華上相天尊志心朝禮眞行明因天尊志心朝禮威光寳際天尊志心朝禮開通信悟天尊志心朝禮慧解明智天尊志心朝禮紫虚上極天尊志心朝禮虚心普照天尊志心朝禮惠源廣潤天尊志心朝禮正覺垂訓天尊志心朝禮眞智照極天尊志心朝禮仙度妙寳天尊志心朝禮紫陽靈應天尊志心朝禮妙意無邊天尊志心朝禮金光善惠天尊志心朝禮玄虚眞行天尊志心朝禮惠空度脫天尊志心朝禮莊嚴玄覺天尊志心朝禮靈感遍通天尊志心朝禮虚皇降照天尊志心朝禮妙極眞源天尊志心朝禮玄應惠明天尊志心朝禮寳相眞陽天尊志心朝禮凝神湛照天尊志心朝禮法雲普潤天尊志心朝禮虚明逺覽天尊志心朝禮法相圓滿天尊志心朝禮妙意端嚴天尊志心朝禮本際玄微天尊志心朝禮沖眞寂照天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人禮三寳已復次懴悔志心歸命十方常住三寳臣等懴悔累劫以來過誤之罪衆等暗昧不省前非或造作惡縁施爲信意心如火盛炎炎而不㨂媸妍意似刀鋒凛凛而不論強弱積時累日經月逾年未遇首陳慮遭塗炭氷池火柱劒樹鑊湯寒即痛心熱來焦體斷筋傷骨腐腹糜腸如此罪元乞垂滌蕩天尊言若有善男子善女人未終之者雖然造罪亦復修福在生修福十分得八將福𥙷罪多少始知若當過去造諸功徳七分之中惟獲其一計功𥙷過福乃有餘如此比量始名得一若將善功補罪不足即當渉歷三塗受諸苦惱一日一夜萬死萬生備受諸苦若有亡人臨終之日諸方請師及見在男女香火知識同於一處燒香懴悔受戒誦經先取亡人身上衣物將對香火懴悔受戒從身亡之後三七日内别置清淨之所安立道場燃燈續明讃詠行道鳴鍾禮拜䖍懇投誠所以爾者急修功徳初亡之人方開道路得悟東西乗此善縁徃生極樂先亡獲救見在蒙恩懴悔旣終志心敬禮人各恭敬志心朝禮妙樂威光天尊志心朝禮普照幽㝠天尊志心朝禮法縁無盡天尊志心朝禮隨機赴感天尊志心朝禮正智玄虚天尊志心朝禮惠日流光天尊志心朝禮瓊華炳耀天尊志心朝禮浮香逺覽天尊志心朝禮飛雲廣覆天尊志心朝禮普度藥王天尊志心朝禮海空惠解天尊志心朝禮慈悲興樂天尊志心朝禮虚皇普濟天尊志心朝禮法燈朗照天尊志心朝禮髙上太虚天尊志心朝禮大慈救苦天尊志心朝禮安住至樂天尊志心朝禮玄和妙寳天尊志心朝禮無爲定惠天尊志心朝禮玄虚嚴靜天尊志心朝禮惠量應物天尊志心朝禮莊嚴素徳天尊志心朝禮虚玄至極天尊志心朝禮妙奉自然天尊志心朝禮慈悲救度天尊志心朝禮無名寳相天尊志心朝禮法雲垂廕天尊志心朝禮慈恩廣化天尊志心朝禮玄津普潤天尊志心朝禮雲和積善天尊志心朝禮大惠凝湛天尊志心朝禮廣開戒定天尊志心朝禮囑累法寳天尊志心朝禮冥神洞照天尊志心朝禮崇仙開化天尊志心朝禮大弘正法天尊志心朝禮無邊普度天尊志心朝禮法橋廣濟天尊志心朝禮徳藏包含天尊志心朝禮權變應現天尊志心朝禮威徳大慈天尊志心朝禮炎光靈耀天尊志心朝禮丹元光妙天尊志心朝禮朱明法本天尊志心朝禮慧命凝常天尊志心朝禮丹靈定慧天尊志心朝禮威光度脫天尊志心朝禮金闕化身天尊志心朝禮逍遥快樂天尊志心朝禮火煉丹界天尊志心朝禮大慈大悲救苦真人志心朝禮大慈大悲大惠真人志心朝禮大慈大悲拔難真人志心朝禮大慈大悲定惠真人志心朝禮大慈大悲濟苦真人志心朝禮大慈大悲上生真人禮三寳巳復次懴悔志心歸命十方常住三寳天尊懴悔累劫以來過誤之罪衆等託䕃父母胞胎或富或貧或貴或賤或善或惡或女或男莫省輪迴難分終始前雖懴悔慮有不周一切𡨚愆咸希洗雪天尊言若有善男子善女人欲使臨終之日願生十方妙樂境界者當以潔淨身心洗除穢垢嚴整衣服捨已資財燒衆妙香請師禮懴懸諸旛蓋音聲讃詠供養三寳口誦尊經一切莊嚴善依言說真法智惠不可思議計斯衆生觀此肉身從空至空寂滅假合地水火風若有休聚敗壞精進行道可得拔度隨意止住福果必登眞心具備出離地獄受樂自然得見大道爾時元始天尊告太上道君曰卿與普救眞人遊行十方見有汝等弟子願生於十方快樂之國無極無窮不可稱計于時天尊道君諸天聖衆所有清靜之境亦無極量不可稱說我於大衆中爲諸四軰未顯之界一切衆生曉示妙境内外三界諸如國土飛天眞人得道聖衆所有名諱略示縁田若能精心奉禮功滿三千布施衆生勤行无怠當生淨境不滯幽牢悉願歸依稽首作禮而退太上慈悲九幽拔罪懴卷之一
