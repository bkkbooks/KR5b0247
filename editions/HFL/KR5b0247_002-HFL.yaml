front:
  text: 太上慈悲九幽拔罪懴卷之二木二爾時元始天尊爲普救眞人演說東方青靈始老蒼帝九炁天君華林境界無極之國惠靜莊嚴旣竟重爲演說東南方梵炁天君碧霞境界其有眞人名曰眞安無極之國妙寂莊嚴若人臨終之曰願生彼國當潔已清齋請師奉禮東南方應號天尊長跪懴悔免恒沙罪障獲無量善因鍊質澄神登真悟道衆等至心今當敬禮
  hash: sha256:5ac6951e4a1b8e4f6f2b03d5dab7e34c63bf34f5d6b54995f9f8cf6610131b60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0247_HFL_002-001a, image: hfl/0300/0300-024.png}
body:
  text: 人各恭敬志心朝禮東南方好生度命天尊志心朝禮慈風廣扇天尊志心朝禮法身出世天尊志心朝禮無礙自在天尊志心朝禮巧說法相天尊志心朝禮増益惠解天尊志心朝禮善權方便天尊志心朝禮至寂澄明天尊志心朝禮智惠无等天尊志心朝禮太微應號天尊志心朝禮通玄定相天尊志心朝禮洞鍳幽明天尊志心朝禮梵明弘教天尊志心朝禮安樂勝報天尊志心朝禮昇玄至極天尊志心朝禮妙光寳勝天尊志心朝禮中和大惠天尊志心朝禮一乗虚極天尊志心朝禮玄宗誕應天尊志心朝禮無量威化天尊志心朝禮宣輝妙覺天尊志心朝禮冥神洞宴天尊志心朝禮金映護䰟天尊志心朝禮西靈惠照天尊志心朝禮四極顯眞天尊志心朝禮玄眞九老天尊志心朝禮上聖十華天尊志心朝禮四虚普照天尊志心朝禮眞元七照天尊志心朝禮二素皓靈天尊志心朝禮金門演教天尊志心朝禮太華上極天尊志心朝禮空洞虚皇天尊志心朝禮玄光度世天尊志心朝禮九空太素天尊志心朝禮靈耀八景天尊志心朝禮七覺照疑天尊志心朝禮三素光明天尊志心朝禮大洞景華天尊志心朝禮無上眞如天尊志心朝禮元和寳勝天尊志心朝禮定光命禄天尊志心朝禮皓華素徳天尊志心朝禮妙寳淨光天尊志心朝禮眞明虚極天尊志心朝禮沖和靈應天尊志心朝禮太和髙上天尊志心朝禮虚極妙靈天尊志心朝禮寳華元梵天尊志心朝禮淨藏祕景天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔至心歸命十方常住三寳臣等懴悔身業之罪自從生誕形體分張首負圓天足履方地肌屍穢醜骨血腥凡不蔽星辰恒干風兩累此陽過必犯隂愆憑此善縁咸希懴洗天尊言曰若有善男子善女人爲其亡人初終百日周年逺忌造諸經像齋供財貨雖多獲功彌少但縁心𢘆慢易意且麤踈殘食獻齋餘財設像一捨一慳或作或休名價雖髙計功全寡或觸之以葷雜或捨之以狐疑致使獲功三分惟一譬如衣服裁截雖了竟乆不縫必欲人著在身未審從何慣帶蓋縁有初無末是以功績不成若人造諸經像設諸齋食及施與法師物等一分失落隱没差殊其福不成何勞須造徒費財貨枉用𥘉功見在招殃亡人獲罪即使重淪地獄再受冥愆苦楚切身飢寒備體逡廵不過竟乆難存鐵杖穿心火丸燋口重重須受一一皆償走避無門竄身何地殃延七祖禍及九玄莫議逍遙空思善果縱生追悔難免前非都縁積善善鍾積惡惡至如形逐影似響隨聲曲直難逃清濁難顯汝等男女精䖍捨施齋潔懴揚莫假聲名便言功徳聲名功徳其罪如斯善女信男悉皆諦受即使魂靈解脫災厄蠲除稽首歸依今當敬禮人各恭敬志心朝禮宗師度脫天尊志心朝禮法力超昇天尊志心朝禮玄素惣徳天尊志心朝禮太華應運天尊志心朝禮髙皇玉帝天尊志心朝禮勝光寳耀天尊志心朝禮髙勝玄景天尊志心朝禮中皇眞際天尊志心朝禮元洞玉晨天尊志心朝禮髙上太一天尊志心朝禮至極明空天尊志心朝禮玉虚挺相天尊志心朝禮惣眞元洞天尊志心朝禮流光應現天尊志心朝禮流鑒照幽天尊志心朝禮通逺深淵天尊志心朝禮金容顯相天尊志心朝禮垂形散影天尊志心朝禮流光四朗天尊志心朝禮洞元積感天尊志心朝禮髙玄惣眞天尊志心朝禮皓明梵寳天尊志心朝禮金光七素天尊志心朝禮玉皇眞極天尊志心朝禮玄上太微天尊志心朝禮洞惠虚容天尊志心朝禮明機流鑒天尊志心朝禮尋眞大洞天尊志心朝禮凝神㑹聖天尊志心朝禮玄眞太一天尊志心朝禮淨滿寳光天尊志心朝禮大乗景徳天尊志心朝禮耀明髙上天尊志心朝禮普垂玄照天尊志心朝禮玉潤流耀天尊志心朝禮上華元一天尊志心朝禮七變元和天尊志心朝禮五劫開化天尊志心朝禮含光祕景天尊志心朝禮清都證極天尊志心朝禮靈化洞虚天尊志心朝禮沖虚入妙天尊志心朝禮延壽保命天尊志心朝禮北極明耀天尊志心朝禮玄虚太極天尊志心朝禮紫庭虚皇天尊志心朝禮金容應福天尊志心朝禮瓊華十善天尊志心朝禮玄微隱耀天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳已復次懴悔至心歸命十方常住三寳臣等懴悔身業之罪但縁分身貴賤髙下不均禀氣富貧寛狹難等或貴者深堂廣宇拖紫紆朱銀壁椒房丹臺玉楯或賤者蒼頭跣足逐後迎前聲氣羇微格式卑下或富者輕裘肥馬奥室精飡言語如鍾心襟似海或貧者飢寒不迨禮義何周言行相違施爲無擬紛兹身業豈解秉持違過更多誰能堅守前雖懴悔尚恐未周當此䖍誠咸希滌蕩天尊言曰善哉如卿所言護持世界能爲衆生方便問難咨請諸疑隨意科數一一具問咸實希有我令重嘆不可思議告諸衆生諦聽修之當爲解說若有善男子善女人等父母終亡之後資備生方捨家資財禮經乞懴蕩滌諸愆獲生天界若有男女寫經造像設供持齋財物有餘私將入己其物直一錢已上十年十倍又復不還身當重病失其相好鳥栖露宿死棄人間永無出期縱得受生聾盲六疾𢘆不具足若用旛花物者七年七倍又復不還身當囚徒在於囹圄被著枷鎻縶繫晨昏劣瘦日深告雪无已若用布施法師物者五年五倍又復不還身爲貧窮衣食寒賤或爲牛馬以力報酬或作豬羊以命相負或㓜遭孤孑无䖏依投倚傍他人身口不備都縁不孝致此𡨚愆汝等男女咸皆諦受勤修功徳秉戒身形一心奉行稽首而退太上慈悲九幽拔罪懴卷之二
