front:
  text: 太上慈悲九幽拔罪懴卷之七木七爾時元始天尊爲普救眞人演說西北方梵氣天君妙道境界無極之國利益莊嚴旣竟重爲演說北方洞隂朔單鬰絶五靈玄老五氣天君定眞境界其有眞人名曰救苦无極之國救度莊嚴若人臨終之日願生彼國當潔巳清齋請師奉禮北方應號天尊長跪懴悔免恒沙罪障獲无量善因錬質澄神登眞悟道衆等志心歸命敬禮
  hash: sha256:d0f51298ee695c80ef1ba25ec936fb83bbe15d606f2c9e1a69a16c1b3ebea982
