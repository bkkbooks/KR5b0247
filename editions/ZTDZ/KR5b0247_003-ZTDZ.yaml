front:
  text: 太上慈悲九幽拔罪懴卷之三木三爾時元始天尊爲普救眞人演說東南方梵炁天君碧霞境界無極之國妙寂莊嚴旣竟重爲演說南方梵寳昌陽丹靈眞老赤帝三炁天君梵天境界其有眞人名曰眞老無極之國端化莊嚴若人臨終之日願生彼國當潔巳清齊請師奉禮南方應號天尊長跪懴悔免恒沙罪障獲無量善因錬質澄神登眞悟道衆等至心今當敬禮
  hash: sha256:a4bfd9bb83ee663c2a16cce6f483940a6ce10b7ca7fda1378b79352a4855f396
