body:
  text: 人各恭敬志心朝禮南方玄眞萬福天尊志心朝禮髙眞大寳天尊志心朝禮玄和大度天尊志心朝禮紫宸降福天尊志心朝禮上惠弘慈天尊志心朝禮冥寂幽源天尊志心朝禮雲光正徳天尊志心朝禮還淳示像天尊志心朝禮安神寂照天尊志心朝禮紫極元君天尊志心朝禮玄眞妙寳天尊志心朝禮四達無礙天尊志心朝禮六辯虚凝天尊志心朝禮明耀景秀天尊志心朝禮圓光炳耀天尊志心朝禮金映流眞天尊志心朝禮玄上紫虚天尊志心朝禮太微妙極天尊志心朝禮靈光空相天尊志心朝禮无上景皇天尊志心朝禮虚明洞惠天尊志心朝禮寳玄流化天尊志心朝禮澄神寳劫天尊志心朝禮妙智湛常天尊志心朝禮五靈玄徳天尊志心朝禮六度凝解天尊志心朝禮髙元上相天尊志心朝禮普光弘濟天尊志心朝禮凝玄髙上天尊志心朝禮耀景元和天尊志心朝禮弘明寳相天尊志心朝禮惠空无滯天尊志心朝禮沖和逺暢天尊志心朝禮含光萬善天尊志心朝禮游虚常樂天尊志心朝禮端嚴上徳天尊志心朝禮明霞通智天尊志心朝禮乗眞道化天尊志心朝禮靈化妙見天尊志心朝禮瑩徳明皇天尊志心朝禮通玄釋滯天尊志心朝禮徳充无上天尊志心朝禮虚皇演聖天尊志心朝禮玄冥廣運天尊志心朝禮慈忍救度天尊志心朝禮中極元老天尊志心朝禮元靈髙聖天尊志心朝禮中皇太一天尊志心朝禮梵氣彌綸天尊志心朝禮黄庭大保天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳已復次懴悔至心歸命十方常住三寳臣等懴悔心業之罪伏自初分南北漸辯東西愛好嫌麤喜富嗔賤信心所作不度短長貪利忘恩隔親憐外見華飾則无猒无足聞簡實則如隙如讎罪積丘山功无塵露慮標名北部奪筭南宫是敢懴悔道前乞垂原赦天尊言若有善男子善女人從生至死毀壞尊像損破道場或剥脫行人及出家法身或破諸禁戒啖葷血之徒五逆生心合舌爲本誹謗三寳嗔怒慈親或棄賤憎貧背夫逐婦或造私潤已背正入邪同炁不親交遊益重或用三寳物無有愧心貸債彌多抵賴不少或殺生偷盗不信公途向暗背明欺存誷殁或罵詈良善淩突賢人婬慾𢘆多隂毒不息諸如此罪盡係冥關不有懴揚將何消蕩若有善男子善女人常行孝心旦暮不怠或爲父母或爲九玄或爲交親或爲血屬或爲兄弟或爲巳身捨施資財請師禮懴精羞供養嚴潔道場或八節三元五臘十直七元本命歲旦庚申是此良辰或持齋戒可除八難能去千災一切𡨚家咸恩洗雪先亡離苦乆逺生天地獄停酸幽關水閉愚癡暁了六疾痊平渉歷四時不罹災舋汝等男女各自慎行兢兢在心勿生猒倦即逢善果遇此因縁懴悔旣終齊心敬禮人各恭敬志心朝禮三素洞神天尊志心朝禮大哀愍苦天尊志心朝禮霞光朗耀天尊志心朝禮中玄正一天尊志心朝禮黄房洞晏天尊志心朝禮玄上虚无天尊志心朝禮玄微大寳天尊志心朝禮黄庭九老天尊志心朝禮威靈拔度天尊志心朝禮大明皓氣天尊志心朝禮玄眞上景天尊志心朝禮太皇勝妙天尊志心朝禮靈元寳命天尊志心朝禮流光通道天尊志心朝禮飛華慶善天尊志心朝禮定相延和天尊志心朝禮廻元至極天尊志心朝禮應飛光像天尊志心朝禮无心妙體天尊志心朝禮六度眞容天尊志心朝禮興龍道相天尊志心朝禮髙眞觀妙天尊志心朝禮流變延眞天尊志心朝禮妙樂難勝天尊志心朝禮元皇一炁天尊志心朝禮玄虚太素天尊志心朝禮眞老福慶天尊志心朝禮青眞妙覺天尊志心朝禮元精始老天尊志心朝禮玄和淨徳天尊志心朝禮太空惠量天尊志心朝禮明眞四極天尊志心朝禮自然靈應天尊志心朝禮積慶天和天尊志心朝禮廣運慈善天尊志心朝禮萬靈導護天尊志心朝禮弘慈廣濟天尊志心朝禮明皇救善天尊志心朝禮開度福道天尊志心朝禮垂光慈䕃天尊志心朝禮妙智善權天尊志心朝禮六合通明天尊志心朝禮開度憂危天尊志心朝禮昇眞大帝天尊志心朝禮神章八㑹天尊志心朝禮太丹三素天尊志心朝禮元和寳相天尊志心朝禮太眞髙上天尊志心朝禮流光萬變天尊志心朝禮通玄眞定天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳已復次懴悔至心歸命十方常住三寳臣等懴悔心業之罪但以智見淺短氣格頑愚恣縱而行言執巳是貪婪無足鄙恡何窮見善而讎聞惡可及積財千萬猶說困懸爲罪深多恒稱公當從初至末豈覺豈知積日積時逾年逾月不申懴洗何以祛除今對道前咸希滌蕩天尊言善男子善女人一切業縁皆有報應汝等諦受次第具陳鐵床壞體銅柱焦筋以報邪婬之罪寒氷雪山痛心傷骨以報劫盜之罪拔舌吞火灌口鎔銅以報兩舌之罪熱灰埋體猛火燒身以報殺生之罪鐵犂耕背惡鳥㗖睛劒樹分張碓磨如麵以報邪眉怒眼之罪身爲餓鬼偱歷鑊湯燒鐵爲丸飢則當食以報破齋違戒之罪眉髮墮落遍體生瘡舉身烘爛以報破壞聖像道場之罪口中出火眼目生瘡遍體流膿藏身無地以報走脫出家人之罪舌不得語閉塞喉中盲目亡睛口唇横裂以報謗說出家人之罪癡聾小短生死不分或作夫妻中道離别以報踈隔父母之罪或爲牛馬豬羊鳥獸鷹犬以報違負貸債之罪或爲僕使寒賤切身少寡㓜孤羇羸劣病以報輕薄弟兄同氣之罪如斯報應皆在目前善女信男咸自思想䖍心諦受永斷前愆懴悔旣終奉行而退太上慈悲九幽拔罪懴卷之三
