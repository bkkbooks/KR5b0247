body:
  text: 人各恭敬志心朝禮西南方太靈虚皇天尊志心朝禮中和善寂天尊志心朝禮崇愛延光天尊志心朝禮大明煥照天尊志心朝禮普救群生天尊志心朝禮景徳丹華天尊志心朝禮通光普照天尊志心朝禮玄機妙應天尊志心朝禮七元信惠天尊志心朝禮端相開妙天尊志心朝禮七曜延靈天尊志心朝禮混成開化天尊志心朝禮通明四洞天尊志心朝禮啓幽元極天尊志心朝禮空玄明梵天尊志心朝禮太上隱眞天尊志心朝禮靈都集慶天尊志心朝禮太靈普被天尊志心朝禮浮空七耀天尊志心朝禮雲光四照天尊志心朝禮保命護魂天尊志心朝禮洞空圓極天尊志心朝禮法輪開化天尊志心朝禮丹華皓映天尊志心朝禮流明大帝天尊志心朝禮玄圃瓊輪天尊志心朝禮留神逺照天尊志心朝禮紫庭㑹聖天尊志心朝禮匠道衆眞天尊志心朝禮廣運玄化天尊志心朝禮靈源普潤天尊志心朝禮崇眞演教天尊志心朝禮安化太无天尊志心朝禮耀景棲眞天尊志心朝禮保光洞朗天尊志心朝禮八景迴晨天尊志心朝禮圓通妙化天尊志心朝禮大明至極天尊志心朝禮靈源廣洽天尊志心朝禮含光朗耀天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔至心歸命十方常住三寳臣等懴悔口業无量之罪或曾欺賢誷聖毀道憎親談讟他非矜誇巳是呵風罵雨惡暑厭寒翻有爲无將麤作細闘合良善揚舉愚癡從口而生爲罪之本諸多過咎無量無邊今日向十方天尊前洗心丹禱歸命懴悔咸乞蕩除天尊言若有善男子善女人一爲天地二爲帝王三爲父母四爲衆生五爲血屬六爲已身爰從受生巳來至于今日自一歳一十二十三十四十五十乃至百歳百二十歳必欲預修還從一七二七三七四七乃至七七百日周年週而復始乃至永年所造功徳還依次第而作第一造像第二寫經次即造四十九尺長旛設四十九人齋安置道場請諸尊像并及法師香火知識燃四十九燈照耀諸天其燈爲三層臺下濶上歛圓轉狀如車輪香華供養隨力豐儉三日三夜或七日七夜傾心丹禱懴悔䖍祈對三寳稱揚爲先亡首過言詞惟在朴實不得浮華務彼精嚴必彰福利其次廣贖生命或百或千隨其多寡亦不可得其次傷憫貧窮下賤不具足者旅困覉棲者病人孤老者囚徒飢餒者邊鄙愚頑不曉東西无分善惡者咸堪救度使沐良縁或值他方逺客有急依投而爲開度濟其厄難救彼孤寒悉令安樂此亦薦導亡靈其福最大其次爲先亡父母億劫種親寫造三十六部尊經任意多少或一部十部百部廼至千部隨力多少拔度魂神其福无量使見存利益過徃逍遙汝等男女悉當諦聽宜各奉行人各恭敬志心朝禮弘眞度物天尊志心朝禮惣御衆仙天尊志心朝禮法明靈鑒天尊志心朝禮太霄耀景天尊志心朝禮結朗重明天尊志心朝禮啓眞玄素天尊志心朝禮混化變生天尊志心朝禮思玄會寂天尊志心朝禮靈光皓映天尊志心朝禮華光流照天尊志心朝禮法音演暢天尊志心朝禮凝虚善寂天尊志心朝禮梵元眞一天尊志心朝禮爲寳積徳天尊志心朝禮福感靈照天尊志心朝禮慈悲惠照天尊志心朝禮無量相好天尊志心朝禮光顯開度天尊志心朝禮正覺凝耀天尊志心朝禮法輪運轉天尊志心朝禮普照洞虚天尊志心朝禮廣濟群有天尊志心朝禮内觀眞極天尊志心朝禮玄宗衆寳天尊志心朝禮虚无正極天尊志心朝禮智光普耀天尊志心朝禮法定通微天尊志心朝禮寳輪常運天尊志心朝禮玄眞會寂天尊志心朝禮玄妙善權天尊志心朝禮等觀眞常天尊志心朝禮重光寳際天尊志心朝禮合和安忍天尊志心朝禮太玄靈耀天尊志心朝禮崇靈道惠天尊志心朝禮玄覺寳光天尊志心朝禮普慈護國天尊志心朝禮神光廣被天尊志心朝禮方便善救天尊志心朝禮无爲應物天尊志心朝禮玉晨上極天尊志心朝禮惣禄主筭天尊志心朝禮定惠上生天尊志心朝禮髙上玉華天尊志心朝禮晨光大帝天尊志心朝禮司命延生天尊志心朝禮惣鑒命魔天尊志心朝禮玉京眞實天尊志心朝禮上聖丹臺天尊志心朝禮度明玉簡天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳已復次懴悔至心歸命十方常住三寳臣等重復懴悔口業之罪自從曠劫以來至于今日口業所重衆等難偕逞辯爲先巧言爲貴或戯上慢下搆僞爲眞輕諾肆情誹謗恣意評論聖教訾毀眞文綺言飾非華詞惑衆躭於滋味茹彼腥羶如此愆非悉爲口業今日向十方天導前洗心懴悔咸乞蕩除爾時太上道君上白天尊言今見細細微塵無億之數寜爲多不天尊言甚多甚多道君曰今將此經像旛贖生散施功徳等寧爲多不天尊曰甚多甚多今將此細微塵數譬於此經像旛功徳亦如塵沙數之得不甚多甚多不可稱量如此因縁最爲第一其經像旛等造訖建立道場七日七夜吟詠讃嘆誦經解結散華行香鳴鍾擊磬令一切𡨚讎悉皆解脫及以眷屬逺近内外親縁皆來道場同發歡喜懴悔布施勿生計念罪可除滅七祖父母出離地獄昇上天堂告諸男女修齋禮拜受戒持心忍辱柔弱供養三寳及出家人斷諸葷穢燒香燃燈贖命放生皆譬我身更無别異善男信女諦聽道前依法奉行稽首而退太上慈悲九幽拔罪懴卷之四
