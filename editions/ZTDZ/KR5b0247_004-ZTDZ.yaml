front:
  text: 太上慈悲九幽拔罪懴卷之四木四爾時元始天尊爲普救眞人演說南方梵寳昌陽丹靈眞老赤帝三炁天君梵天境界無極之國端化莊嚴旣竞重爲演說西南方梵炁天君耀眞境界其有眞人名曰瓊光無極之國善救莊嚴若人臨終之日願生彼國當潔己清齋請師奉禮西南方應號天尊長跪懴悔免恒沙罪障獲无量善因錬質澄神登真悟道衆等至心今當敬禮
  hash: sha256:1a720407aa7e338c63a85ce973356df00a43310ee926ea7387d428c9826e8d2a
