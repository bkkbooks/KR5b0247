front:
  text: 太上慈悲九幽拔罪懴卷之八木八爾時元始天尊爲普救眞人演說北方洞隂朔單鬱絶五靈玄老五炁天君眞定境界無極之國救度莊嚴旣竟重爲演說東北方梵炁天君長樂境界其有眞人名曰妙音无極之國周帀莊嚴若人臨終之日願生彼國當潔已清齋請師奉禮東北方應號天尊長跪懴悔滅恒沙罪障獲无量善因鍊魄朱陵遊神紫府衆等至心歸命敬禮
  hash: sha256:97c431d7fbb923cbb1d0bee59a185e0527619bf79f1a32a203c1018b76cad543
