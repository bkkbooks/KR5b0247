body:
  text: 人各恭敬志心朝禮東北方度仙上聖天尊志心朝禮智惠无盡天尊志心朝禮大智成就天尊志心朝禮歡喜清淨天尊志心朝禮定生延壽天尊志心朝禮廣度沉淪天尊志心朝禮積功成聖天尊志心朝禮凝神照境天尊志心朝禮和神利物天尊志心朝禮緫領衆靈天尊志心朝禮幽照無極天尊志心朝禮善斷迷惑天尊志心朝禮瓊瑤寳蓋天尊志心朝禮朱景洞照天尊志心朝禮體悟萬徳天尊志心朝禮大洞淵微天尊志心朝禮萬行圓滿天尊志心朝禮無極玉皇天尊志心朝禮太乗空惠天尊志心朝禮清淨遺慈天尊志心朝禮還功報徳天尊志心朝禮隱跡全道天尊志心朝禮法體圓滿天尊志心朝禮髙上玉皇天尊志心朝禮紫霞浮蓋天尊志心朝禮玄智逺照天尊志心朝禮法雲流潤天尊志心朝禮闡揚妙化天尊志心朝禮行圓空界天尊志心朝禮感降慈縁天尊志心朝禮湛寂體玄天尊志心朝禮玉京垂惠天尊志心朝禮保度應權天尊志心朝禮太微光範天尊志心朝禮眞相具足天尊志心朝禮法縁常濟天尊志心朝禮勸化無礙天尊志心朝禮大光𢘆照天尊志心朝禮道炁舍育天尊志心朝禮降伏强良天尊志心朝禮延光布像天尊志心朝禮永證道源天尊志心朝禮志節微妙天尊志心朝禮常傳眞戒天尊志心朝禮道惠圓滿天尊志心朝禮光徳具足天尊志心朝禮无量慈惠天尊志心朝禮沖和靜樂天尊志心朝禮玄隱無爲天尊志心朝禮幽源不測天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔志心歸命東北方無上天尊懴悔受經破戒之罪衆等自從无量劫來至于今日捨生受生受諸報應或曾尊受經戒三戒五戒九戒十戒十二可從戒二十四戒一百八十戒三百大戒或曽親受或見人受皆不信敬𢘆起慢心穢犯過多誹謗非一以同戯謔曽不護持言行有違書寫不敬讀誦訛謬文字參差或曽讀上清經靈寳經正一經道徳經西昇經黄庭經内觀經太平經消災經報恩經九幽經救苦經及諸經戒或曽讀誦或見人讀誦以爲輕戲不起䖍心侮聖人言笑大道義或供養有闕或保護不專或書寫紙墨怯惡裝潢卷軸欹斜或脫落眞文或揩攺義理都縁愚昧是有乖儀浮世不堅懴陳未遇今遇大道懇願消除天尊言如上罪縁其尤最甚如不懴洗永失輪迴若未終年即遇惡疾形骸劣弱肌骨尫殘氣息微羸言辭拙惡禮貌乖差去就生踈或已壽終難逢淨土遊魂北岱量罪重輕以其報對苦惱无窮輪迴无計種種捶考楚毒難言啼呌難言呻吟莫及痛來傷骨熱即連心劒樹千尋攀縁須上鑊湯百沸積壓須沉消爛形軀晝夜不捨何縁託廕無可受生如此罪源惣由前作汝等男女各自省心勤奉至眞當求後果請禮經懴使入福田巳亡者早得生天未終者皆希安樂諦聽諦受依法修行懴悔道前志心敬禮人各恭敬志心朝禮坤元保大天尊志心朝禮后載博物天尊志心朝禮無邊善達天尊志心朝禮利育群生天尊志心朝禮遐宣道廕天尊志心朝禮設大慈惠天尊志心朝禮去住无相天尊志心朝禮陶化四生天尊志心朝禮太虛常寂天尊志心朝禮紫極觀相天尊志心朝禮澄眞靜意天尊志心朝禮紫府凝神天尊志心朝禮恒遊寂處天尊志心朝禮信樂正法天尊志心朝禮勝華潜耀天尊志心朝禮黙念無爲天尊志心朝禮髙眞定智天尊志心朝禮玄臺勤功天尊志心朝禮羣靈普護天尊志心朝禮揮靈妙用天尊志心朝禮凝神生惠天尊志心朝禮慈教廣度天尊志心朝禮教度八難天尊志心朝禮延壽无盡天尊志心朝禮寂住玄都天尊志心朝禮和光隱妙天尊志心朝禮窈冥神光天尊志心朝禮清淨眞惠天尊志心朝禮東華廣徳天尊志心朝禮至極安樂天尊志心朝禮端靖凝和天尊志心朝禮最勝妙果天尊志心朝禮善救世界天尊志心朝禮湛相淳寂天尊志心朝禮應念救生天尊志心朝禮百寳勝嚴天尊志心朝禮廣啓神化天尊志心朝禮髙虛最妙天尊志心朝禮廣化玄宗天尊志心朝禮南丹輝惠天尊志心朝禮朱靈寳徳天尊志心朝禮妙力寳王天尊志心朝禮虛極垂感天尊志心朝禮具教方便天尊志心朝禮慈和忍愛天尊志心朝禮尊貴无邊天尊志心朝禮寧撫萬神天尊志心朝禮晏豫景像天尊志心朝禮緫朝上帝天尊志心朝禮玄理垂文天尊志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人志心朝禮大慈大悲救苦眞人志心朝禮大慈大悲大惠眞人禮三寳巳復次懴悔志心歸命東北方无上天尊懴悔破齋毀道之罪衆等自從无始劫來至于今日捨身受身受諸報應或曾修設齋醮飡啖齋食不生敬信或修上清齋金籙齋黄籙齋靈寳齋三元齋北帝齋八節齋十直齋五臘齋庚申齋本命齋如是等齋或曽親設或曽親受雖言名目不起敬心多有觸犯或將葷辛混雜腥穢同厨不潔巳身但多慢易過中更食宿心不精誹謗至眞將同邪僞言猶虛誕心豈䖍恭如上罪根秤量最重死入地獄无有生全或入酆都山二十四地獄或入監天地獄虛天地獄元正地獄玄沙地獄北縁地獄刑正地獄律令地獄九天地獄青冥地獄天一地獄河伯地獄累劫地獄女青地獄如是等二十四獄三寳五靈三官九府一百二十曹千二百掾吏執罰神兵五萬人考掠罪魂或足履刀山或手攀劒樹或抱銅柱或卧鐵床頭頂火山身負鐵杖飢則食炭渴飲鎔銅或入鑊湯或經爐炭碓擣磑磨倒懸立鋸或硤石逼身針鋒貫體足下煨燒臂間杻鎻天尊言如斯罪𩔖報應分明若有善男子善女人得悟此經心生信向清淨供養禮拜燒香乞滅三塗冥司罪累億曽萬祖過徃亡靈爰及己身見存眷屬所纒殃過請乞解紛即遣飛天神人齎九龍之符命歷諸地獄悉令蕩滌咸使消除迴向發心増修上善稽首歸依十方常住三寳太上慈悲九幽拔罪懴卷之八
